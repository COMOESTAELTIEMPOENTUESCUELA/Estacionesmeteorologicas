<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Coordinadores · Editar Reportes</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.475.0/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="text-slate-800 antialiased p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <div class="flex items-center gap-3 mb-8">
            <img src="imagenes/Logo1.jpg" alt="Logo" class="w-10 h-10 object-cover rounded-full border-2 border-fuchsia-300">
            <div>
                <h1 class="font-black text-xl text-slate-800 leading-none">Panel de Coordinadores</h1>
                <span class="text-xs font-bold text-slate-400">Cargar y editar reportes de la comunidad</span>
            </div>
        </div>

        <!-- PORTÓN DE CLAVE -->
        <div id="porton-clave" class="bg-white border-4 border-slate-200 rounded-3xl p-8 shadow-sm max-w-md">
            <label class="block text-sm font-black text-slate-700 mb-2">🔒 Clave de coordinadores</label>
            <input type="password" id="input-clave" placeholder="Ingresá la clave" class="w-full border-4 border-slate-100 p-4 rounded-2xl font-bold text-slate-700 focus:outline-none focus:border-fuchsia-400 bg-slate-50 transition mb-3">
            <button id="btn-entrar" class="w-full bg-fuchsia-500 hover:bg-fuchsia-400 text-white font-black py-3 rounded-2xl transition">Entrar</button>
            <p id="clave-error" class="text-sm font-bold text-red-500 mt-3 hidden">Clave incorrecta, probá de nuevo.</p>
        </div>

        <!-- PANEL (oculto hasta ingresar clave) -->
        <div id="panel" class="hidden">

            <!-- FORMULARIO ALTA/EDICIÓN -->
            <div class="bg-white border-4 border-fuchsia-200 rounded-3xl p-6 md:p-8 shadow-sm mb-8">
                <h2 id="form-titulo" class="text-xl font-black mb-6">Nuevo reporte</h2>
                <form id="form-reporte" class="space-y-5">
                    <input type="hidden" id="campo-index" value="">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-black text-slate-700 mb-1">Título</label>
                            <input type="text" id="campo-title" required class="w-full border-2 border-slate-200 p-3 rounded-xl font-semibold bg-slate-50">
                        </div>
                        <div>
                            <label class="block text-sm font-black text-slate-700 mb-1">Fecha</label>
                            <input type="date" id="campo-date" required class="w-full border-2 border-slate-200 p-3 rounded-xl font-semibold bg-slate-50">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-black text-slate-700 mb-1">Tipo de reporte</label>
                            <select id="campo-type" required class="w-full border-2 border-slate-200 p-3 rounded-xl font-semibold bg-slate-50">
                                <option value="lluvia">🌧️ Lluvia / Precipitación</option>
                                <option value="calle_anegada">🌊 Calle anegada</option>
                                <option value="rocio">💧 Rocío</option>
                                <option value="escarcha">❄️ Escarcha / Helada</option>
                                <option value="otro">📝 Otro</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-black text-slate-700 mb-1">Escuela o zona</label>
                            <input type="text" id="campo-school" class="w-full border-2 border-slate-200 p-3 rounded-xl font-semibold bg-slate-50">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-black text-slate-700 mb-1">Quién reportó</label>
                            <input type="text" id="campo-reporter" placeholder="WhatsApp, formulario, etc." class="w-full border-2 border-slate-200 p-3 rounded-xl font-semibold bg-slate-50">
                        </div>
                        <div>
                            <label class="block text-sm font-black text-slate-700 mb-1">Lluvia (mm)</label>
                            <input type="number" step="0.1" id="campo-rain" class="w-full border-2 border-slate-200 p-3 rounded-xl font-semibold bg-slate-50">
                        </div>
                        <div>
                            <label class="block text-sm font-black text-slate-700 mb-1">Estado del camino</label>
                            <select id="campo-road" class="w-full border-2 border-slate-200 p-3 rounded-xl font-semibold bg-slate-50">
                                <option value="">—</option>
                                <option value="Seco">Seco</option>
                                <option value="Resbaladizo">Resbaladizo</option>
                                <option value="Intransitable">Intransitable</option>
                                <option value="Asfalto">Asfalto</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-black text-slate-700 mb-1">Resumen (2-3 frases)</label>
                        <textarea id="campo-summary" required rows="2" class="w-full border-2 border-slate-200 p-3 rounded-xl font-semibold bg-slate-50"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-black text-slate-700 mb-1">Ubicación (tocá el mapa para marcar el lugar)</label>
                        <div id="mapa-editor" class="w-full h-64 rounded-2xl border-2 border-slate-200 overflow-hidden"></div>
                        <p id="ubicacion-texto" class="text-xs font-bold text-slate-400 mt-1">Sin ubicación marcada (opcional)</p>
                    </div>

                    <div>
                        <label class="block text-sm font-black text-slate-700 mb-1">Foto (opcional)</label>
                        <label for="campo-image" class="cursor-pointer inline-flex items-center gap-2 bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-xl font-bold text-sm">
                            <i data-lucide="image-plus" class="w-4 h-4"></i> Elegir foto
                        </label>
                        <input type="file" id="campo-image" accept="image/*">
                        <span id="nombre-foto" class="text-xs font-bold text-slate-400 ml-2"></span>
                    </div>

                    <div class="flex gap-3 pt-2">
                        <button type="submit" id="btn-guardar" class="bg-emerald-500 hover:bg-emerald-400 text-white font-black px-6 py-3 rounded-2xl transition flex items-center gap-2">
                            <i data-lucide="save" class="w-4 h-4"></i> Guardar reporte
                        </button>
                        <button type="button" id="btn-cancelar" class="hidden bg-slate-200 hover:bg-slate-300 text-slate-700 font-black px-6 py-3 rounded-2xl transition">
                            Cancelar edición
                        </button>
                    </div>
                    <p id="guardar-status" class="text-sm font-bold hidden"></p>
                </form>
            </div>

            <!-- LISTA DE REPORTES EXISTENTES -->
            <div class="bg-white border-4 border-slate-200 rounded-3xl p-6 md:p-8 shadow-sm">
                <h2 class="text-xl font-black mb-4">Reportes cargados</h2>
                <div id="lista-reportes" class="space-y-3">
                    <p class="text-slate-400 font-bold">Cargando...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const CLAVE_KEY = 'coord_clave';
        const portonClave = document.getElementById('porton-clave');
        const panel = document.getElementById('panel');
        const inputClave = document.getElementById('input-clave');
        const btnEntrar = document.getElementById('btn-entrar');
        const claveError = document.getElementById('clave-error');

        let reportesActuales = [];
        let mapaEditor, marcadorEditor;
        let ubicacionSeleccionada = null;

        function iniciarPanel() {
            portonClave.classList.add('hidden');
            panel.classList.remove('hidden');
            if (!mapaEditor) {
                mapaEditor = L.map('mapa-editor').setView([-34.95, -57.7], 9);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap',
                    maxZoom: 19
                }).addTo(mapaEditor);
                mapaEditor.on('click', function(e) {
                    ubicacionSeleccionada = e.latlng;
                    if (marcadorEditor) mapaEditor.removeLayer(marcadorEditor);
                    marcadorEditor = L.marker(e.latlng).addTo(mapaEditor);
                    document.getElementById('ubicacion-texto').textContent =
                        'Ubicación marcada: ' + e.latlng.lat.toFixed(5) + ', ' + e.latlng.lng.toFixed(5);
                });
            }
            cargarLista();
        }

        btnEntrar.addEventListener('click', function() {
            const clave = inputClave.value.trim();
            if (!clave) return;
            sessionStorage.setItem(CLAVE_KEY, clave);
            claveError.classList.add('hidden');
            iniciarPanel();
        });

        // Si ya había una clave guardada en esta pestaña, entramos directo
        if (sessionStorage.getItem(CLAVE_KEY)) {
            iniciarPanel();
        }

        function getClave() {
            return sessionStorage.getItem(CLAVE_KEY) || '';
        }

        async function cargarLista() {
            const res = await fetch('_data/reportes.json?t=' + Date.now());
            const data = await res.json();
            reportesActuales = data.reportes || [];
            pintarLista();
        }

        function pintarLista() {
            const contenedor = document.getElementById('lista-reportes');
            if (!reportesActuales.length) {
                contenedor.innerHTML = '<p class="text-slate-400 font-bold">Todavía no hay reportes.</p>';
                return;
            }
            contenedor.innerHTML = reportesActuales.map(function(r, i) {
                return '' +
                    '<div class="flex items-center justify-between gap-4 border-2 border-slate-100 rounded-xl p-3">' +
                        '<div>' +
                            '<p class="font-black text-slate-800">' + (r.title || '(sin título)') + '</p>' +
                            '<p class="text-xs font-bold text-slate-400">' + (r.school || '') + ' · ' + (r.date ? new Date(r.date).toLocaleDateString('es-AR') : '') + '</p>' +
                        '</div>' +
                        '<div class="flex gap-2 shrink-0">' +
                            '<button data-idx="' + i + '" class="btn-editar bg-slate-100 hover:bg-slate-200 px-3 py-2 rounded-lg text-sm font-bold">Editar</button>' +
                            '<button data-idx="' + i + '" class="btn-eliminar bg-red-50 hover:bg-red-100 text-red-600 px-3 py-2 rounded-lg text-sm font-bold">Eliminar</button>' +
                        '</div>' +
                    '</div>';
            }).join('');

            document.querySelectorAll('.btn-editar').forEach(function(btn) {
                btn.addEventListener('click', function() { cargarEnFormulario(parseInt(btn.dataset.idx, 10)); });
            });
            document.querySelectorAll('.btn-eliminar').forEach(function(btn) {
                btn.addEventListener('click', function() { eliminarReporte(parseInt(btn.dataset.idx, 10)); });
            });
        }

        function limpiarFormulario() {
            document.getElementById('form-reporte').reset();
            document.getElementById('campo-index').value = '';
            document.getElementById('form-titulo').textContent = 'Nuevo reporte';
            document.getElementById('btn-cancelar').classList.add('hidden');
            document.getElementById('nombre-foto').textContent = '';
            ubicacionSeleccionada = null;
            document.getElementById('ubicacion-texto').textContent = 'Sin ubicación marcada (opcional)';
            if (marcadorEditor) { mapaEditor.removeLayer(marcadorEditor); marcadorEditor = null; }
        }

        function cargarEnFormulario(idx) {
            const r = reportesActuales[idx];
            if (!r) return;
            document.getElementById('campo-index').value = idx;
            document.getElementById('campo-title').value = r.title || '';
            document.getElementById('campo-date').value = r.date ? r.date.slice(0, 10) : '';
            document.getElementById('campo-type').value = r.type || 'otro';
            document.getElementById('campo-school').value = r.school || '';
            document.getElementById('campo-reporter').value = r.reporter || '';
            document.getElementById('campo-rain').value = r.rain_mm !== undefined ? r.rain_mm : '';
            document.getElementById('campo-road').value = r.road_status || '';
            document.getElementById('campo-summary').value = r.summary || '';
            document.getElementById('form-titulo').textContent = 'Editando: ' + (r.title || '');
            document.getElementById('btn-cancelar').classList.remove('hidden');

            if (r.location) {
                try {
                    const geo = JSON.parse(r.location);
                    const latlng = { lat: geo.coordinates[1], lng: geo.coordinates[0] };
                    ubicacionSeleccionada = latlng;
                    if (marcadorEditor) mapaEditor.removeLayer(marcadorEditor);
                    marcadorEditor = L.marker(latlng).addTo(mapaEditor);
                    mapaEditor.setView(latlng, 13);
                    document.getElementById('ubicacion-texto').textContent =
                        'Ubicación marcada: ' + latlng.lat.toFixed(5) + ', ' + latlng.lng.toFixed(5);
                } catch (e) { /* ubicación inválida, se ignora */ }
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('btn-cancelar').addEventListener('click', limpiarFormulario);

        async function eliminarReporte(idx) {
            if (!confirm('¿Seguro que querés eliminar este reporte?')) return;
            const res = await fetch('/.netlify/functions/reportes', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: getClave(), index: idx }),
            });
            if (res.status === 401) {
                alert('Clave incorrecta. Volvé a ingresar la clave.');
                sessionStorage.removeItem(CLAVE_KEY);
                location.reload();
                return;
            }
            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                alert('Error al eliminar: ' + (data.error || res.status));
                return;
            }
            await cargarLista();
        }

        function fileToBase64(file) {
            return new Promise(function(resolve, reject) {
                const reader = new FileReader();
                reader.onload = function() { resolve(reader.result); };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('campo-image').addEventListener('change', function() {
            const f = this.files[0];
            document.getElementById('nombre-foto').textContent = f ? f.name : '';
        });

        document.getElementById('form-reporte').addEventListener('submit', async function(e) {
            e.preventDefault();
            const status = document.getElementById('guardar-status');
            status.classList.remove('hidden');
            status.className = 'text-sm font-bold text-slate-400';
            status.textContent = 'Guardando... puede tardar unos segundos.';

            const indexValue = document.getElementById('campo-index').value;
            const esEdicion = indexValue !== '';

            const report = {
                title: document.getElementById('campo-title').value,
                date: new Date(document.getElementById('campo-date').value).toISOString(),
                type: document.getElementById('campo-type').value,
                school: document.getElementById('campo-school').value,
                reporter: document.getElementById('campo-reporter').value,
                rain_mm: document.getElementById('campo-rain').value ? parseFloat(document.getElementById('campo-rain').value) : null,
                road_status: document.getElementById('campo-road').value,
                summary: document.getElementById('campo-summary').value,
            };

            if (ubicacionSeleccionada) {
                report.location = JSON.stringify({
                    type: 'Point',
                    coordinates: [ubicacionSeleccionada.lng, ubicacionSeleccionada.lat],
                });
            }

            const body = { password: getClave(), report };
            const fileInput = document.getElementById('campo-image');
            if (fileInput.files[0]) {
                body.imageBase64 = await fileToBase64(fileInput.files[0]);
                body.imageName = fileInput.files[0].name;
            }

            let res;
            if (esEdicion) {
                body.index = parseInt(indexValue, 10);
                res = await fetch('/.netlify/functions/reportes', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
            } else {
                res = await fetch('/.netlify/functions/reportes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
            }

            if (res.status === 401) {
                status.className = 'text-sm font-bold text-red-500';
                status.textContent = 'Clave incorrecta.';
                sessionStorage.removeItem(CLAVE_KEY);
                return;
            }
            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                status.className = 'text-sm font-bold text-red-500';
                status.textContent = 'Error: ' + (data.error || res.status);
                return;
            }

            status.className = 'text-sm font-bold text-emerald-600';
            status.textContent = '¡Guardado! El sitio va a mostrar el cambio en menos de un minuto.';
            limpiarFormulario();
            await cargarLista();
        });
    </script>
</body>
</html>
