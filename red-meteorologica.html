<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo Meteorológico - EMA EP 23</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            color: #334155; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* Tarjetas estilo Institucional / Analítico */
        .metric-card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-top-width: 4px;
            border-radius: 12px;
            padding: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-col;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .metric-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .metric-title {
            font-size: 0.70rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
        }

        .metric-value {
            font-size: 2.25rem;
            font-weight: 800;
            color: #0f172a;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .metric-unit {
            font-size: 0.875rem;
            font-weight: 600;
            color: #94a3b8;
            margin-left: 0.25rem;
        }

        /* Contenedor de gráficos */
        .chart-card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .tab-btn {
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .tab-btn:hover { background-color: #e2e8f0; }
        .tab-btn.active { 
            background-color: #004b87; 
            color: white; 
            box-shadow: 0 2px 4px rgba(0, 75, 135, 0.2);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <header class="bg-white p-6 rounded-2xl border border-slate-200 border-t-4 border-t-[#004b87] shadow-sm flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-5 w-full md:w-auto">
                <div class="w-16 h-16 bg-slate-50 rounded-xl flex items-center justify-center border border-slate-200 shrink-0">
                    <i class="fa-solid fa-building-columns text-2xl text-[#004b87]"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tight">Red de Monitoreo Ambiental</h1>
                    <p class="text-slate-500 font-semibold text-sm mt-1"><i class="fa-solid fa-location-dot mr-1"></i> EMA Escuela Primaria N° 23</p>
                </div>
            </div>
            
            <div class="flex flex-col items-end gap-2">
                <span id="systemStatus" class="bg-slate-100 text-slate-600 text-[10px] font-bold px-3 py-1.5 rounded-md uppercase tracking-wider border border-slate-200">
                    <i class="fa-solid fa-arrows-rotate mr-1 animate-spin"></i> Cargando...
                </span>
                <span class="text-[10px] text-slate-400 font-medium">Factor Pluviómetro: 0.68mm</span>
            </div>
        </header>

        <div class="flex flex-col xl:flex-row justify-between items-center gap-4 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
            <div class="flex gap-2 w-full xl:w-auto bg-slate-50 p-1.5 rounded-lg border border-slate-100">
                <button onclick="setPreset('day')" id="btn-day" class="tab-btn active px-6 py-2 text-sm font-bold rounded-md flex-1">Hoy</button>
                <button onclick="setPreset('week')" id="btn-week" class="tab-btn px-6 py-2 text-sm font-bold rounded-md flex-1">Semana</button>
                <button onclick="setPreset('month')" id="btn-month" class="tab-btn px-6 py-2 text-sm font-bold rounded-md flex-1">Mes</button>
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-3 w-full xl:w-auto">
                <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-md px-3 py-1.5 w-full sm:w-auto">
                    <label class="font-bold text-[10px] text-slate-500 uppercase tracking-wide">Desde</label>
                    <input type="datetime-local" id="startDatetime" class="bg-transparent border-none text-sm text-slate-700 outline-none w-full">
                </div>
                <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-md px-3 py-1.5 w-full sm:w-auto">
                    <label class="font-bold text-[10px] text-slate-500 uppercase tracking-wide">Hasta</label>
                    <input type="datetime-local" id="endDatetime" class="bg-transparent border-none text-sm text-slate-700 outline-none w-full">
                </div>
                <button onclick="updateDashboard(true)" class="bg-[#004b87] hover:bg-[#003865] text-white px-5 py-2.5 rounded-md transition-colors font-bold shadow-sm w-full sm:w-auto flex items-center justify-center text-sm">
                    <i class="fa-solid fa-filter mr-2"></i>Aplicar
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-5 gap-4">
            
            <div class="metric-card border-t-[#ea580c]">
                <div class="flex justify-between items-start mb-4">
                    <span class="metric-title">Temperatura</span>
                    <i class="fa-solid fa-temperature-half text-[#ea580c] opacity-80 text-lg"></i>
                </div>
                <div class="flex items-baseline">
                    <span class="metric-value" id="valTemp">--</span>
                    <span class="metric-unit">°C</span>
                </div>
            </div>

            <div class="metric-card border-t-[#0284c7]">
                <div class="flex justify-between items-start mb-4">
                    <span class="metric-title">Humedad Rel.</span>
                    <i class="fa-solid fa-droplet text-[#0284c7] opacity-80 text-lg"></i>
                </div>
                <div class="flex items-baseline">
                    <span class="metric-value" id="valHum">--</span>
                    <span class="metric-unit">%</span>
                </div>
            </div>

            <div class="metric-card border-t-[#16a34a]">
                <div class="flex justify-between items-start mb-4">
                    <span class="metric-title">Hum. Suelo</span>
                    <i class="fa-solid fa-seedling text-[#16a34a] opacity-80 text-lg"></i>
                </div>
                <div class="flex items-baseline">
                    <span class="metric-value" id="valHumTierra">--</span>
                    <span class="metric-unit">%</span>
                </div>
            </div>

            <div class="metric-card border-t-[#9333ea]">
                <div class="flex justify-between items-start mb-4">
                    <span class="metric-title">Presión Abs.</span>
                    <i class="fa-solid fa-gauge-high text-[#9333ea] opacity-80 text-lg"></i>
                </div>
                <div class="flex items-baseline">
                    <span class="metric-value" id="valPres">--</span>
                    <span class="metric-unit">hPa</span>
                </div>
            </div>

            <div class="metric-card border-t-[#004b87] bg-slate-50 col-span-2 lg:col-span-1">
                <div class="flex justify-between items-start mb-4">
                    <span class="metric-title text-[#004b87]">Lluvia Acum.</span>
                    <i class="fa-solid fa-cloud-showers-heavy text-[#004b87] opacity-80 text-lg"></i>
                </div>
                <div class="flex items-baseline">
                    <span class="metric-value text-[#004b87]" id="valPrecip">0.0</span>
                    <span class="metric-unit text-[#004b87]">mm</span>
                </div>
            </div>

        </div>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
            <div class="chart-card col-span-1 xl:col-span-2">
                <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wide mb-4 flex items-center">
                    <i class="fa-solid fa-chart-column mr-2 text-[#004b87]"></i> Curva de Precipitación
                </h3>
                <div class="relative w-full h-[280px]">
                    <canvas id="chartPrecip"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wide mb-4 flex items-center">
                    <i class="fa-solid fa-temperature-three-quarters mr-2 text-[#ea580c]"></i> Termohigrómetro
                </h3>
                <div class="relative w-full h-[240px]">
                    <canvas id="chartTempHum"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wide mb-4 flex items-center">
                    <i class="fa-solid fa-gauge mr-2 text-[#9333ea]"></i> Presión Atmosférica
                </h3>
                <div class="relative w-full h-[240px]">
                    <canvas id="chartPres"></canvas>
                </div>
            </div>
            
            <div class="chart-card col-span-1 xl:col-span-2 mb-8">
                <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wide mb-4 flex items-center">
                    <i class="fa-solid fa-leaf mr-2 text-[#16a34a]"></i> Humedad de Suelo
                </h3>
                <div class="relative w-full h-[200px]">
                    <canvas id="chartSoil"></canvas>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        const V_ACTUAL = { id: "2626952", api: "4XYH56YSV64HE17H" };
        const V_HISTORICO = { id: "1778165", api: "OJ1JHKAPCCIQB4CB" }; 
        const MULT_PRECIP = 0.68;

        let charts = {};

        function toDatetimeLocal(date) {
            const pad = (n) => n.toString().padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        function setPreset(range) {
            const now = new Date();
            const endStr = toDatetimeLocal(now);
            const start = new Date(now);

            if (range === 'day') { start.setHours(0, 0, 0, 0); } 
            else if (range === 'week') { start.setDate(start.getDate() - 7); start.setHours(0, 0, 0, 0); } 
            else if (range === 'month') { start.setDate(start.getDate() - 30); start.setHours(0, 0, 0, 0); }

            document.getElementById('startDatetime').value = toDatetimeLocal(start);
            document.getElementById('endDatetime').value = endStr;

            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('btn-' + range);
            if(btn) btn.classList.add('active');

            updateDashboard();
        }

        async function fetchAllFeeds(station, startStr, endStr) {
            const tsStart = startStr.replace('T', '%20') + ':00';
            const tsEnd = endStr.replace('T', '%20') + ':59';
            const url = `https://api.thingspeak.com/channels/${station.id}/feeds.json?api_key=${station.api}&start=${tsStart}&end=${tsEnd}&timezone=America/Argentina/Buenos_Aires&results=8000`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                return data.feeds || [];
            } catch (e) {
                return [];
            }
        }

        function updateUIStatus(status) {
            const badge = document.getElementById('systemStatus');
            if (status === 'loading') {
                badge.innerHTML = '<i class="fa-solid fa-arrows-rotate mr-1 animate-spin"></i> Sincronizando...';
                badge.className = "bg-blue-50 text-blue-600 text-[10px] font-bold px-3 py-1.5 rounded-md uppercase tracking-wider border border-blue-200";
            } else if (status === 'online') {
                badge.innerHTML = '<i class="fa-solid fa-circle-check mr-1"></i> Sistema Activo';
                badge.className = "bg-emerald-50 text-emerald-600 text-[10px] font-bold px-3 py-1.5 rounded-md uppercase tracking-wider border border-emerald-200";
            } else if (status === 'historical') {
                badge.innerHTML = '<i class="fa-solid fa-clock-rotate-left mr-1"></i> Histórico';
                badge.className = "bg-amber-50 text-amber-600 text-[10px] font-bold px-3 py-1.5 rounded-md uppercase tracking-wider border border-amber-200";
            }
        }

        async function updateDashboard(isManual = false) {
            if (isManual) document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            const startStr = document.getElementById('startDatetime').value;
            const endStr = document.getElementById('endDatetime').value;
            
            if (!startStr || !endStr) return;

            updateUIStatus('loading');

            const [feedsActual, feedsHist] = await Promise.all([
                fetchAllFeeds(V_ACTUAL, startStr, endStr),
                fetchAllFeeds(V_HISTORICO, startStr, endStr)
            ]);

            let allFeeds = [...feedsHist, ...feedsActual];
            const uniqueFeedsMap = new Map();
            allFeeds.forEach(f => uniqueFeedsMap.set(f.created_at, f));
            allFeeds = Array.from(uniqueFeedsMap.values()).sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            if (feedsActual.length > 0) updateUIStatus('online');
            else if (feedsHist.length > 0) updateUIStatus('historical');

            processData(allFeeds, startStr, endStr);
        }

        function processData(feeds, startStr, endStr) {
            const labels = [];
            const dataTemp = []; const dataHum = []; const dataSoil = []; const dataPres = [];
            let lastTemp = "--", lastHum = "--", lastSoil = "--", lastPres = "--";

            const start = new Date(startStr); const end = new Date(endStr);
            const diffHours = (end - start) / 3600000;
            const bucketByHour = diffHours <= 72; 
            const precipBuckets = new Map();
            let current = new Date(start);

            if (bucketByHour) {
                current.setMinutes(0, 0, 0);
                while (current <= end) {
                    const pad = (n) => n.toString().padStart(2, '0');
                    precipBuckets.set(`${pad(current.getDate())}/${pad(current.getMonth()+1)} ${pad(current.getHours())}:00`, 0);
                    current.setHours(current.getHours() + 1);
                }
            } else {
                current.setHours(0, 0, 0, 0);
                while (current <= end) {
                    const pad = (n) => n.toString().padStart(2, '0');
                    precipBuckets.set(`${pad(current.getDate())}/${pad(current.getMonth()+1)}/${current.getFullYear()}`, 0);
                    current.setDate(current.getDate() + 1);
                }
            }

            let accumRain = 0;

            feeds.forEach(f => {
                const dateObj = new Date(f.created_at);
                const pad = (n) => n.toString().padStart(2, '0');
                const timeLabel = diffHours <= 72 
                    ? `${pad(dateObj.getDate())}/${pad(dateObj.getMonth()+1)} ${pad(dateObj.getHours())}:${pad(dateObj.getMinutes())}` 
                    : `${pad(dateObj.getDate())}/${pad(dateObj.getMonth()+1)}`;

                labels.push(timeLabel);

                // Campos según API previa
                const temp = parseFloat(f.field1);
                const hum = parseFloat(f.field2);
                const soil = parseFloat(f.field3);
                const rainPulse = parseFloat(f.field5);
                const pres = parseFloat(f.field6);

                if(!isNaN(temp)) { dataTemp.push(temp); lastTemp = temp.toFixed(1); }
                if(!isNaN(hum)) { dataHum.push(hum); lastHum = hum.toFixed(0); }
                if(!isNaN(soil)) { dataSoil.push(soil); lastSoil = soil.toFixed(0); }
                if(!isNaN(pres)) { dataPres.push(pres); lastPres = pres.toFixed(1); }

                if(!isNaN(rainPulse) && rainPulse > 0) {
                    accumRain += MULT_PRECIP;
                    let bKey = bucketByHour 
                        ? `${pad(dateObj.getDate())}/${pad(dateObj.getMonth()+1)} ${pad(dateObj.getHours())}:00`
                        : `${pad(dateObj.getDate())}/${pad(dateObj.getMonth()+1)}/${dateObj.getFullYear()}`;
                    if (precipBuckets.has(bKey)) {
                        precipBuckets.set(bKey, precipBuckets.get(bKey) + MULT_PRECIP);
                    }
                }
            });

            const precipLabels = Array.from(precipBuckets.keys());
            const precipData = [];
            let runningSum = 0;
            for (let [k, val] of precipBuckets) {
                runningSum += val;
                precipData.push(runningSum);
            }

            document.getElementById('valTemp').innerText = lastTemp;
            document.getElementById('valHum').innerText = lastHum;
            document.getElementById('valHumTierra').innerText = lastSoil;
            document.getElementById('valPres').innerText = lastPres;
            document.getElementById('valPrecip').innerText = accumRain.toFixed(1);

            renderPrecipChart(precipLabels, precipData);
            renderTempHumChart(labels, dataTemp, dataHum);
            renderPresChart(labels, dataPres);
            renderSoilChart(labels, dataSoil);
        }

        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { labels: { font: { family: 'Inter', size: 12 }, usePointStyle: true, boxWidth: 6 } },
                tooltip: { backgroundColor: '#1e293b', padding: 10, cornerRadius: 8, titleFont: { family: 'Inter' }, bodyFont: { family: 'Inter', weight: 'bold' } }
            },
            elements: { point: { radius: 0, hitRadius: 8 } },
            scales: {
                x: { grid: { display: false }, ticks: { maxTicksLimit: 8, color: '#94a3b8', font: {family: 'Inter', size: 11} } },
                y: { grid: { color: '#f1f5f9' }, ticks: { color: '#64748b', font: {family: 'Inter', size: 11} } }
            }
        };

        function renderPrecipChart(labels, data) {
            const ctx = document.getElementById('chartPrecip').getContext('2d');
            if (charts.precip) charts.precip.destroy();
            charts.precip = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ label: 'Lluvia Acumulada (mm)', data: data, borderColor: '#004b87', backgroundColor: 'rgba(0, 75, 135, 0.05)', borderWidth: 2, fill: true, stepped: true }]
                },
                options: commonOptions
            });
        }

        function renderTempHumChart(labels, temp, hum) {
            const ctx = document.getElementById('chartTempHum').getContext('2d');
            if (charts.temphum) charts.temphum.destroy();
            charts.temphum = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Temp (°C)', data: temp, borderColor: '#ea580c', borderWidth: 2, yAxisID: 'y' },
                        { label: 'Hum (%)', data: hum, borderColor: '#0284c7', borderWidth: 2, yAxisID: 'y1' }
                    ]
                },
                options: {
                    ...commonOptions,
                    scales: {
                        x: commonOptions.scales.x,
                        y: { type: 'linear', display: true, position: 'left' },
                        y1: { type: 'linear', display: true, position: 'right', min: 0, max: 100, grid: { drawOnChartArea: false } }
                    }
                }
            });
        }

        function renderPresChart(labels, pres) {
            const ctx = document.getElementById('chartPres').getContext('2d');
            if (charts.pres) charts.pres.destroy();
            charts.pres = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ label: 'Presión (hPa)', data: pres, borderColor: '#9333ea', backgroundColor: 'rgba(147, 51, 234, 0.05)', borderWidth: 2, fill: true }]
                },
                options: commonOptions
            });
        }

        function renderSoilChart(labels, soil) {
            const ctx = document.getElementById('chartSoil').getContext('2d');
            if (charts.soil) charts.soil.destroy();
            charts.soil = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ label: 'Hum. Suelo (%)', data: soil, borderColor: '#16a34a', backgroundColor: 'rgba(22, 163, 74, 0.05)', borderWidth: 2, fill: true, tension: 0.2 }]
                },
                options: { ...commonOptions, scales: { ...commonOptions.scales, y: { ...commonOptions.scales.y, min: 0, max: 100 } } }
            });
        }

        window.addEventListener('load', () => {
            setPreset('day');
        });
    </script>
</body>
</html>
