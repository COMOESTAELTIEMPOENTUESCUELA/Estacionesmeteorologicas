<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar History Turbo - Mauricio</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #00f2ff; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .controls { background: var(--card); padding: 15px; border-radius: 12px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .dashboard { display: grid; grid-template-columns: 1fr; gap: 15px; max-width: 1000px; margin: auto; }
        .panel { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #2d3748; }
        .radar-display { background: #000; border-radius: 8px; min-height: 500px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border: 2px solid #334155; }
        .radar-display img { width: 100%; height: auto; display: block; }
        .radar-gallery { display: flex; gap: 12px; overflow-x: auto; padding: 15px; background: #0b1120; border-radius: 10px; border: 1px solid var(--accent); }
        .thumb { min-width: 110px; padding: 12px; background: #1e293b; border: 2px solid #475569; cursor: pointer; border-radius: 8px; text-align: center; transition: 0.2s; font-weight: bold; }
        .thumb:hover { border-color: var(--accent); transform: scale(1.05); }
        .thumb.active { border-color: #00ff00; background: #064e3b; box-shadow: 0 0 10px rgba(0,255,0,0.3); }
        .loader-bar { height: 6px; background: #334155; margin-bottom: 10px; border-radius: 3px; overflow: hidden; }
        .loader-progress { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
        input, button { background: #0b0f19; color: white; border: 1px solid #475569; padding: 10px; border-radius: 6px; font-size: 0.9rem; }
        .btn-scan { background: var(--accent); color: #0b0f19; font-weight: bold; cursor: pointer; border: none; padding: 10px 30px; }
        .btn-scan:disabled { opacity: 0.5; }
        #status { text-align: center; margin-bottom: 10px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="controls">
    <div style="display:flex; align-items:center; gap:10px;">
        <label>Fecha del Evento:</label>
        <input type="date" id="fecha" value="2024-03-18">
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
        <label>Hora (HOA):</label>
        <input type="number" id="hora" value="12" min="0" max="23" style="width: 60px;">
    </div>
    <button class="btn-scan" id="scan-btn" onclick="escanearHistorial()">ESCANEAR HISTORIAL</button>
</div>

<div class="dashboard">
    <div class="panel">
        <div class="loader-bar"><div id="progress" class="loader-progress"></div></div>
        <div id="status">Seleccioná una fecha y hora para iniciar el análisis.</div>
        
        <div class="radar-display">
            <img id="main-radar" src="" alt="Esperando escaneo del historial...">
        </div>

        <div class="radar-gallery" id="gallery">
            </div>
    </div>
</div>

<script>
    async function escanearHistorial() {
        const fechaVal = document.getElementById('fecha').value;
        if (!fechaVal) return alert("Por favor selecciona una fecha");

        const partes = fechaVal.split('-'); // [2024, 03, 18]
        const anio = partes[0];
        const mes = parseInt(partes[1]).toString(); // Elimina el cero inicial si lo tiene (ej: "03" -> "3")
        const dia = parseInt(partes[2]).toString(); // "18"
        const fechaCompacta = partes[0] + partes[1] + partes[2]; // "20240318"
        
        const h = document.getElementById('hora').value.padStart(2, '0');
        const btn = document.getElementById('scan-btn');
        const gallery = document.getElementById('gallery');
        const progress = document.getElementById('progress');
        const status = document.getElementById('status');

        btn.disabled = true;
        gallery.innerHTML = "";
        progress.style.width = "0%";
        status.innerText = `Buscando ciclos de radar para el ${dia}/${mes}/${anio} a las ${h}hs...`;

        // Lanzamos escaneo paralelo de los 60 minutos
        const promesas = [];
        for (let m = 0; m < 60; m++) {
            promesas.push(escanearMinutoHistorial(anio, mes, dia, fechaCompacta, h, m.toString().padStart(2, '0')));
        }

        const resultados = await Promise.all(promesas);
        
        let encontrados = 0;
        // Filtrar y ordenar resultados por tiempo
        const exitos = resultados.filter(r => r !== null).sort((a, b) => a.tiempo.localeCompare(b.tiempo));
        
        exitos.forEach(res => {
            encontrados++;
            agregarALaGaleria(res.url, res.tiempo);
        });

        progress.style.width = "100%";
        status.innerText = encontrados > 0 
            ? `Análisis completo. Se encontraron ${encontrados} ciclos.` 
            : "No se encontraron imágenes. Verificá si el radar estaba operativo ese día.";
        btn.disabled = false;
    }

    async function escanearMinutoHistorial(anio, mes, dia, fechaCompacta, h, m) {
        // Segundos más comunes en el historial de ClimaSur
        const segundosProbables = ["00", "05", "10", "15", "20", "25", "30", "35", "40", "45", "50", "55", "18", "23", "36", "43", "52"];
        
        for (let s of segundosProbables) {
            // ESTRUCTURA DE CARPETAS DE HISTORIAL: /radar/historial/AÑO/MES/DIA/ezeiza-YYYYMMDD-HHMMSS.png
            let url = `https://www.climasurgba.com.ar/radar/historial/${anio}/${mes}/${dia}/ezeiza-${fechaCompacta}-${h}${m}${s}.png`;
            
            if (await verificar(url)) {
                return { url, tiempo: `${h}:${m}:${s}` };
            }
        }
        return null;
    }

    function verificar(url) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(true);
            img.onerror = () => resolve(false);
            img.src = url;
            setTimeout(() => resolve(false), 2500); // Timeout rápido para velocidad
        });
    }

    function agregarALaGaleria(url, tiempo) {
        const thumb = document.createElement('div');
        thumb.className = 'thumb';
        thumb.innerText = tiempo;
        thumb.onclick = function() {
            document.getElementById('main-radar').src = url;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
        };
        document.getElementById('gallery').appendChild(thumb);
        // Cargar la primera imagen encontrada por defecto
        if (document.getElementById('gallery').children.length === 1) thumb.click();
    }
</script>
</body>
</html>
