<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis Sinóptico - GFS & CEPETEC</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #00d1ff; --text: #f0f0f0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        .header { text-align: center; border-bottom: 2px solid var(--accent); margin-bottom: 20px; padding-bottom: 10px; }
        
        .controls { background: var(--card); padding: 15px; border-radius: 10px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; margin-bottom: 20px; }
        
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(600px, 1fr)); gap: 20px; }
        
        .panel { background: var(--card); border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .panel h2 { font-size: 1.2rem; color: var(--accent); margin-top: 0; display: flex; justify-content: space-between; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { background: #333; color: white; border: none; padding: 5px 12px; cursor: pointer; border-radius: 4px; font-size: 0.8rem; }
        .tab-btn.active { background: var(--accent); color: black; font-weight: bold; }

        img { width: 100%; border-radius: 8px; border: 1px solid #444; min-height: 300px; background: #000; }
        
        select, input, button { background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 5px; }
        button { background: var(--accent); color: black; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>Dashboard Meteorológico Operativo</h1>
</div>

<div class="controls">
    <div>
        <label>Fecha Inicial:</label>
        <input type="date" id="fecha" value="2024-03-18">
    </div>
    <div>
        <label>Ciclo (Z):</label>
        <select id="ciclo">
            <option value="00">00Z</option>
            <option value="06">06Z</option>
            <option value="12" selected>12Z</option>
            <option value="18">18Z</option>
        </select>
    </div>
    <button onclick="cargarTodo()">Actualizar Análisis</button>
</div>

<div class="dashboard">
    <div class="panel">
        <h2>GFS - Alicia Bentley <span id="label-nivel">500 hPa</span></h2>
        <div class="tabs">
            <button class="tab-btn active" onclick="cambiarNivel('500_mslp_thickness', '500 hPa & MSLP', this)">500hPa</button>
            <button class="tab-btn" onclick="cambiarNivel('850_temp_mslp_wind', '850 hPa Temp/Viento', this)">850hPa</button>
            <button class="tab-btn" onclick="cambiarNivel('250_wind_mslp', '250 hPa (Jet)', this)">250hPa</button>
            <button class="tab-btn" onclick="cambiarNivel('pw_mslp_wind', 'Agua Precipitable', this)">PWAT</button>
        </div>
        <img id="img-gfs" src="" alt="Cargando GFS...">
    </div>

    <div class="panel">
        <h2>Satélite - CEPETEC (GOES-16)</h2>
        <div class="tabs">
            <button class="tab-btn active" onclick="cambiarSat('topes', this)">Topes Nubosos</button>
            <button class="tab-btn" onclick="cambiarSat('wv', this)">Vapor de Agua</button>
            <button class="tab-btn" onclick="cambiarSat('vis', this)">Visible</button>
        </div>
        <img id="img-cepetec" src="" alt="Cargando Satélite...">
        <p><small>Nota: Las imágenes de CEPETEC pueden requerir ajuste de URL según el servidor actual.</small></p>
    </div>
</div>

<script>
    let nivelActual = '500_mslp_thickness';
    let canalSat = 'topes';

    function cargarTodo() {
        const fecha = document.getElementById('fecha').value.replace(/-/g, '');
        const ciclo = document.getElementById('ciclo').value;

        // 1. Lógica GFS Alicia Bentley
        // Estructura típica: http://www.atmos.albany.edu/facstaff/bentley/realtime/images/gfs/res/fecha/nivel_f000.png
        // Nota: Estas URLs son para tiempo real. Para histórico, ella usa carpetas específicas.
        const urlGFS = `http://www.atmos.albany.edu/facstaff/bentley/realtime/images/gfs/southamer/${nivelActual}_f000.png`;
        document.getElementById('img-gfs').src = urlGFS;

        // 2. Lógica CEPETEC
        // El CEPETEC usa rutas dinámicas, este es un ejemplo de la estructura de archivo
        // Para historial preciso de un día como el 18/03/2024, se suele usar el repositorio de RAMMB o el archivo del SMN.
        const urlSat = `https://cepetec.at.fcen.uba.ar/proyectos/geofisica/datos/goes16/ch13_topes_latest.jpg`; 
        document.getElementById('img-cepetec').src = urlSat;
    }

    function cambiarNivel(nivel, label, btn) {
        nivelActual = nivel;
        document.getElementById('label-nivel').innerText = label;
        actualizarBotones(btn);
        cargarTodo();
    }

    function cambiarSat(canal, btn) {
        canalSat = canal;
        actualizarBotones(btn);
        // Aquí cambiarías la lógica de URL de CEPETEC según el canal
        cargarTodo();
    }

    function actualizarBotones(btn) {
        const hermanos = btn.parentNode.querySelectorAll('.tab-btn');
        hermanos.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    window.onload = cargarTodo;
</script>

</body>
</html>
