backend:
  name: github
  repo: COMOESTAELTIEMPOENTUESCUELA/Estacionesmeteorologicas # Usa tu usuario/repo
  branch: main

# Rutas de Archivos
media_folder: "imagenes/reportes"
public_folder: "imagenes/reportes" # <<-- CORREGIDO: SE QUITÓ LA BARRA INCLINADA INICIAL

collections:
  - name: "reportes"
    label: "Reportes de la Comunidad"
    files:
      - file: "_data/reportes.json"
        label: "Lista de Reportes"
        name: "reportes"
        fields:
          - label: "Reportes"
            name: "reportes"
            widget: "list"
            summary: "{{title}} — {{fields.school}}"
            fields:
              - {label: "Título del Reporte", name: "title", widget: "string", required: true}
              - {label: "Fecha", name: "date", widget: "datetime", required: true, format: "DD/MM/YYYY", time_format: false}
              - label: "Tipo de Reporte"
                name: "type"
                widget: "select"
                required: true
                options:
                  - {label: "🌧️ Lluvia / Precipitación", value: "lluvia"}
                  - {label: "🌊 Calle anegada", value: "calle_anegada"}
                  - {label: "💧 Rocío", value: "rocio"}
                  - {label: "❄️ Escarcha / Helada", value: "escarcha"}
                  - {label: "📝 Otro", value: "otro"}
              - {label: "Escuela o Zona", name: "school", widget: "string", required: false}
              - {label: "Quién reportó", name: "reporter", widget: "string", required: false, hint: "Nombre de quién envió el dato (WhatsApp, formulario web, o vos mismo)"}
              - {label: "Lluvia (mm)", name: "rain_mm", widget: "number", value_type: "float", required: false}
              - label: "Estado del camino"
                name: "road_status"
                widget: "select"
                required: false
                options:
                  - {label: "Seco y súper bien", value: "Seco"}
                  - {label: "Un poco de barro (resbaladizo)", value: "Resbaladizo"}
                  - {label: "Mucho barro y agua (intransitable)", value: "Intransitable"}
                  - {label: "Camino de asfalto (todo bien)", value: "Asfalto"}
              - {label: "Ubicación en el mapa", name: "location", widget: "map", type: "Point", required: false, hint: "Marcá el lugar del reporte para que aparezca en el mapa"}
              - {label: "Descripción Corta", name: "summary", widget: "text", required: true, hint: "Máximo 2-3 frases"}
              - {label: "Foto", name: "image", widget: "image", required: false}
              - {label: "Detalle completo (Opcional)", name: "body", widget: "markdown", required: false, hint: "Contenido extendido, si hace falta"}
