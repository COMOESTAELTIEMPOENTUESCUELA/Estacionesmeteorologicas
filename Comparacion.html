<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Cómo está el tiempo? · FCAG-UNLP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Quicksand', sans-serif; 
            background-color: #4A90E2;
            margin: 0;
            overflow-x: hidden;
        }

        /* Capa de nubes con Parallax */
        .nubes-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/clouds.png');
            background-repeat: repeat;
            z-index: -1;
            pointer-events: none;
        }

        .didactic-card { 
            background: white; 
            border-radius: 30px; 
            box-shadow: 0 8px 0px #357ABD; 
            border: 3px solid #2D3E50;
        }

        .header-box {
            background: #FFD15B;
            border: 3px solid #2D3E50;
            border-radius: 15px;
            box-shadow: 3px 3px 0px #2D3E50;
            display: inline-block;
        }

        .btn-check {
            background: #FFD15B;
            border: 3px solid #2D3E50;
            box-shadow: 3px 3px 0px #2D3E50;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 15px;
            cursor: pointer;
        }

        .btn-check:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px #2D3E50; }
        
        .logo-container {
            width: 200px; height: 200px;
            margin: 0 auto 2rem auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            border: 6px solid #2D3E50;
            border-radius: 50%;
            overflow: hidden;
            background-color: white;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        canvas { max-height: 250px !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="nubes-bg" id="nubes"></div>

    <div class="max-w-6xl mx-auto relative z-10">
        <header class="text-center mb-12">
            <div class="logo-container">
                <img src="https://raw.githubusercontent.com/COMOESTAELTIEMPOENTUESCUELA/Estacionesmeteorologicas/main/imagenes/Logo1.jpg" alt="Logo">
            </div>
            
            <div class="flex justify-center">
                <div class="bg-white/95 p-4 rounded-2xl border-2 border-[#2D3E50] flex flex-wrap gap-4 items-center shadow-xl">
                    <div class="flex items-center gap-2">
                        <span class="bg-[#2D3E50] text-white px-3 py-1 rounded-full text-xs font-bold">Desde</span>
                        <input type="date" id="fechaInicio" class="border-2 border-[#2D3E50] rounded-lg p-1 font-bold">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="bg-[#2D3E50] text-white px-3 py-1 rounded-full text-xs font-bold">Hasta</span>
                        <input type="date" id="fechaFin" class="border-2 border-[#2D3E50] rounded-lg p-1 font-bold">
                    </div>
                    <button onclick="cargarDatos()" class="btn-check uppercase text-sm">Actualizar</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
            <div class="didactic-card p-6 text-center">
                <div class="header-box px-3 py-1 mb-4 font-bold text-xs">VIOLETA</div>
                <div class="text-5xl font-black mb-2" id="val-violeta">--°</div>
                <div class="bg-purple-100 border-2 border-purple-500 rounded-full py-1 font-bold text-purple-700">
                    Lluvia: <span id="rain-violeta">0.0</span> mm
                </div>
            </div>
            <div class="didactic-card p-6 text-center">
                <div class="header-box px-3 py-1 mb-4 font-bold text-xs">VERDE</div>
                <div class="text-5xl font-black mb-2" id="val-verde">--°</div>
                <div class="bg-emerald-100 border-2 border-emerald-500 rounded-full py-1 font-bold text-emerald-700">
                    Lluvia: <span id="rain-verde">0.0</span> mm
                </div>
            </div>
            <div class="didactic-card p-6 text-center">
                <div class="header-box px-3 py-1 mb-4 font-bold text-sm">BLANCA</div>
                <div class="text-5xl font-black mb-2" id="val-blanca">--°</div>
                <div class="bg-blue-100 border-2 border-blue-500 rounded-full py-1 font-bold text-blue-700">
                    Lluvia: <span id="rain-blanca">0.0</span> mm
                </div>
            </div>
        </div>

        <div class="didactic-card p-6 mb-10 overflow-hidden">
            <h3 class="font-bold text-xl mb-4 flex items-center gap-2 text-[#2D3E50]">
                <span class="bg-red-400 p-2 rounded-xl text-white"><i data-lucide="map"></i></span>
                Red de Estaciones en La Plata
            </h3>
            <iframe src="https://www.wunderground.com/wundermap?lat=-34.921&lon=-57.955&zoom=12" 
                    width="100%" height="500" class="rounded-2xl border-2 border-slate-200"></iframe>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            <div class="didactic-card p-6">
                <h3 class="font-bold text-lg mb-4 text-[#2D3E50] flex items-center gap-2"><i data-lucide="line-chart"></i> Temperatura</h3>
                <canvas id="chartTemp"></canvas>
            </div>
            <div class="didactic-card p-6">
                <h3 class="font-bold text-lg mb-4 text-[#2D3E50] flex items-center gap-2"><i data-lucide="cloud-rain"></i> Lluvia</h3>
                <canvas id="chartRain"></canvas>
            </div>
        </div>

        <footer class="text-center text-white font-bold pb-10">
            <p>FCAG - UNLP · Proyecto de Extensión</p>
        </footer>
    </div>

<script>
    lucide.createIcons();

    // Efecto Parallax para las nubes
    window.addEventListener('scroll', function() {
        const nubes = document.getElementById('nubes');
        let offset = window.pageYOffset;
        nubes.style.backgroundPositionY = offset * 0.5 + 'px';
    });

    const CONFIG = {
        violeta: { id: 2626952, key: "AXYH56YSV64HE17H", color: '#a855f7' },
        verde: { id: 2218686, key: "JUXJQRZMFFASO37Z", color: '#10b981' },
        blanca: { id: 2218689, key: "ZLNOSLZJPQM3H7SD", color: '#3b82f6' }
    };
    let charts = {};

    async function cargarDatos() {
        const inicio = document.getElementById('fechaInicio').value;
        const fin = document.getElementById('fechaFin').value;
        let query = "results=200"; 
        if (inicio && fin) query = `start=${inicio}%2000:00:00&end=${fin}%2023:59:59&timezone=America/Argentina/Buenos_Aires`;

        try {
            const resultados = await Promise.all(Object.keys(CONFIG).map(k => fetch(`https://api.thingspeak.com/channels/${CONFIG[k].id}/feeds.json?${query}&api_key=${CONFIG[k].key}`).then(r => r.json())));
            actualizarCards(resultados);
            dibujarGraficos(resultados[0].feeds, resultados[1].feeds, resultados[2].feeds);
        } catch (e) { console.error(e); }
    }

    function actualizarCards(resultados) {
        ['violeta', 'verde', 'blanca'].forEach((key, i) => {
            const feeds = resultados[i].feeds.filter(f => f.field1 !== null);
            if (feeds.length > 0) {
                let t = parseFloat(feeds[feeds.length - 1].field1);
                if (key === 'verde') t -= 2.0;
                document.getElementById(`val-${key}`).innerText = `${t.toFixed(1)}°`;
            }
        });
    }

    function dibujarGraficos(fVio, fVer, fBla) {
        const prep = (feeds, field, type, ema) => {
            let fBusq = field;
            if (type === 'rain') fBusq = (ema === 'verde') ? 'field3' : 'field5';
            let acum = 0, lastDia = -1, lastVal = null;
            return feeds.filter(f => f[fBusq] !== null).map(f => {
                const date = new Date(f.created_at);
                let v = parseFloat(f[fBusq]) || 0;
                if (type === 'normal' && field === 'field1' && ema === 'verde') v -= 2.0;
                if (type === 'rain') {
                    if (lastDia !== date.getDate()) { acum = 0; lastDia = date.getDate(); lastVal = v; }
                    if (ema !== 'verde') {
                        let inc = v - (lastVal !== null ? lastVal : v);
                        if (inc > 0) acum += inc;
                        lastVal = v;
                    } else { acum += v; }
                    document.getElementById(`rain-${ema}`).innerText = acum.toFixed(1);
                    return { x: date.getTime(), y: parseFloat(acum.toFixed(2)) };
                }
                return { x: date.getTime(), y: v };
            });
        };

        const makeChart = (id, field, type) => {
            if(charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), {
                type: 'line',
                data: { datasets: [
                    { label: 'Violeta', data: prep(fVio, field, type, 'violeta'), borderColor: CONFIG.violeta.color, borderWidth: 3, tension: 0.3, pointRadius: 0 },
                    { label: 'Verde', data: prep(fVer, field, type, 'verde'), borderColor: CONFIG.verde.color, borderWidth: 3, tension: 0.3, pointRadius: 0 },
                    { label: 'Blanca', data: prep(fBla, field, type, 'blanca'), borderColor: CONFIG.blanca.color, borderWidth: 3, tension: 0.3, pointRadius: 0 }
                ]},
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { type: 'time' } } }
            });
        };
        makeChart('chartTemp', 'field1', 'normal');
        makeChart('chartRain', 'field5', 'rain');
    }

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('fechaInicio').value = today;
    document.getElementById('fechaFin').value = today;
    cargarDatos();
</script>
</body>
</html>
