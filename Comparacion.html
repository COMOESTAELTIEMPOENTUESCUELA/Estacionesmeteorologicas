<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Cómo está el tiempo? · FCAG-UNLP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Quicksand', sans-serif; 
            /* Color de base azul cielo */
            background-color: #4A90E2;
            /* El truco del Parallax: fixed hace que el fondo no suba con el contenido */
            background-image: url('https://www.transparenttextures.com/patterns/clouds.png');
            background-attachment: fixed;
            background-position: center;
            color: #2D3E50; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* Animación suave adicional para que las nubes se muevan solas muy lento */
        @keyframes moveClouds {
            from { background-position: 0 0; }
            to { background-position: 1000px 0; }
        }
        body {
            animation: moveClouds 100s linear infinite;
        }

        .didactic-card { 
            background: white; 
            border-radius: 30px; 
            box-shadow: 0 8px 0px #357ABD; 
            border: 3px solid #2D3E50;
        }

        .header-box {
            background: #FFD15B;
            border: 3px solid #2D3E50;
            border-radius: 20px;
            box-shadow: 4px 4px 0px #2D3E50;
            display: inline-block;
        }

        .btn-check {
            background: #FFD15B;
            border: 3px solid #2D3E50;
            box-shadow: 3px 3px 0px #2D3E50;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 15px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-check:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px #2D3E50; }
        
        .logo-container {
            width: 220px;
            height: 220px;
            margin: 0 auto 2rem auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            border: 6px solid #2D3E50;
            border-radius: 50%;
            overflow: hidden;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas { max-height: 250px !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto relative z-10">
        <header class="text-center mb-12">
            <div class="logo-container">
                <img src="https://raw.githubusercontent.com/COMOESTAELTIEMPOENTUESCUELA/Estacionesmeteorologicas/main/imagenes/Logo1.jpg" 
                     alt="Logo ¿Cómo está el tiempo en tu escuela?">
            </div>
            
            <div class="flex justify-center">
                <div class="bg-white/90 p-4 rounded-2xl border-2 border-[#2D3E50] flex flex-wrap gap-4 items-center shadow-lg">
                    <div class="flex items-center gap-2">
                        <span class="bg-[#2D3E50] text-white px-3 py-1 rounded-full text-xs font-bold uppercase">Desde</span>
                        <input type="date" id="fechaInicio" class="border-2 border-[#2D3E50] rounded-lg p-1 font-bold outline-none">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="bg-[#2D3E50] text-white px-3 py-1 rounded-full text-xs font-bold uppercase">Hasta</span>
                        <input type="date" id="fechaFin" class="border-2 border-[#2D3E50] rounded-lg p-1 font-bold outline-none">
                    </div>
                    <button onclick="cargarDatos()" class="btn-check">¡Actualizar!</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
            <div class="didactic-card p-6 text-center">
                <div class="header-box px-4 py-1 mb-4 font-bold text-sm">ESTACIÓN VIOLETA</div>
                <div class="flex justify-center mb-2 text-purple-500"><i data-lucide="thermometer" class="w-12 h-12"></i></div>
                <div class="text-5xl font-black" id="val-violeta">--°</div>
                <div class="mt-4 bg-purple-100 border-2 border-purple-500 rounded-full py-2 font-bold text-purple-700">
                    Lluvia: <span id="rain-violeta">0.0</span> mm
                </div>
            </div>

            <div class="didactic-card p-6 text-center">
                <div class="header-box px-4 py-1 mb-4 font-bold text-sm">ESTACIÓN VERDE</div>
                <div class="flex justify-center mb-2 text-emerald-500"><i data-lucide="thermometer-sun" class="w-12 h-12"></i></div>
                <div class="text-5xl font-black" id="val-verde">--°</div>
                <div class="mt-4 bg-emerald-100 border-2 border-emerald-500 rounded-full py-2 font-bold text-emerald-700">
                    Lluvia: <span id="rain-verde">0.0</span> mm
                </div>
            </div>

            <div class="didactic-card p-6 text-center">
                <div class="header-box px-4 py-1 mb-4 font-bold text-sm">ESTACIÓN BLANCA</div>
                <div class="flex justify-center mb-2 text-blue-500"><i data-lucide="thermometer-snowflake" class="w-12 h-12"></i></div>
                <div class="text-5xl font-black" id="val-blanca">--°</div>
                <div class="mt-4 bg-blue-100 border-2 border-blue-500 rounded-full py-2 font-bold text-blue-700">
                    Lluvia: <span id="rain-blanca">0.0</span> mm
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            <div class="didactic-card p-6">
                <h3 class="font-bold text-xl mb-4 flex items-center gap-2 text-[#2D3E50]">
                    <span class="bg-orange-400 p-2 rounded-xl text-white"><i data-lucide="line-chart"></i></span>
                    ¿Cómo cambió la temperatura?
                </h3>
                <div class="h-64"><canvas id="chartTemp"></canvas></div>
            </div>
            <div class="didactic-card p-6">
                <h3 class="font-bold text-xl mb-4 flex items-center gap-2 text-[#2D3E50]">
                    <span class="bg-blue-400 p-2 rounded-xl text-white"><i data-lucide="cloud-rain"></i></span>
                    ¿Cuánto llovió hoy?
                </h3>
                <div class="h-64"><canvas id="chartRain"></canvas></div>
            </div>
            <div class="didactic-card p-6">
                <h3 class="font-bold text-xl mb-4 flex items-center gap-2 text-[#2D3E50]">
                    <span class="bg-cyan-500 p-2 rounded-xl text-white"><i data-lucide="droplets"></i></span>
                    Humedad en el aire
                </h3>
                <div class="h-64"><canvas id="chartHum"></canvas></div>
            </div>
            <div class="didactic-card p-6">
                <h3 class="font-bold text-xl mb-4 flex items-center gap-2 text-[#2D3E50]">
                    <span class="bg-emerald-500 p-2 rounded-xl text-white"><i data-lucide="gauge"></i></span>
                    Presión del aire (hPa)
                </h3>
                <div class="h-64"><canvas id="chartPres"></canvas></div>
            </div>
        </div>

        <footer class="text-center text-white font-bold pb-10 drop-shadow-md">
            <p>Proyecto de Extensión Universitaria · FCAG - UNLP</p>
        </footer>
    </div>

<script>
    lucide.createIcons();
    const CONFIG = {
        violeta: { id: 2626952, key: "AXYH56YSV64HE17H", color: '#a855f7' },
        verde: { id: 2218686, key: "JUXJQRZMFFASO37Z", color: '#10b981' },
        blanca: { id: 2218689, key: "ZLNOSLZJPQM3H7SD", color: '#3b82f6' }
    };
    let charts = {};

    async function cargarDatos() {
        const inicio = document.getElementById('fechaInicio').value;
        const fin = document.getElementById('fechaFin').value;
        let query = "results=300"; 
        if (inicio && fin) query = `start=${inicio}%2000:00:00&end=${fin}%2023:59:59&timezone=America/Argentina/Buenos_Aires`;

        try {
            const resultados = await Promise.all(Object.keys(CONFIG).map(k => fetch(`https://api.thingspeak.com/channels/${CONFIG[k].id}/feeds.json?${query}&api_key=${CONFIG[k].key}`).then(r => r.json())));
            actualizarCards(resultados);
            dibujarGraficos(resultados[0].feeds, resultados[1].feeds, resultados[2].feeds);
        } catch (e) { console.error("Error cargando datos:", e); }
    }

    function actualizarCards(resultados) {
        ['violeta', 'verde', 'blanca'].forEach((key, i) => {
            const feeds = resultados[i].feeds.filter(f => f.field1 !== null);
            if (feeds.length > 0) {
                let t = parseFloat(feeds[feeds.length - 1].field1);
                if (key === 'verde') t -= 2.0;
                document.getElementById(`val-${key}`).innerText = `${t.toFixed(1)}°`;
            }
        });
    }

    function dibujarGraficos(fVio, fVer, fBla) {
        const prep = (feeds, field, type, ema) => {
            let fBusq = field;
            if (type === 'rain') fBusq = (ema === 'verde') ? 'field3' : 'field5';
            let acum = 0, lastDia = -1, lastVal = null;

            return feeds.filter(f => f[fBusq] !== null).map(f => {
                const date = new Date(f.created_at);
                let v = parseFloat(f[fBusq]) || 0;
                if (type === 'normal' && field === 'field1' && ema === 'verde') v -= 2.0;

                if (type === 'rain') {
                    if (lastDia !== date.getDate()) { acum = 0; lastDia = date.getDate(); lastVal = v; }
                    if (ema !== 'verde') {
                        let inc = v - (lastVal !== null ? lastVal : v);
                        if (inc > 0) acum += inc;
                        lastVal = v;
                    } else { acum += v; }
                    document.getElementById(`rain-${ema}`).innerText = acum.toFixed(1);
                    return { x: date.getTime(), y: parseFloat(acum.toFixed(2)) };
                }
                return { x: date.getTime(), y: v };
            });
        };

        const makeChart = (id, field, type) => {
            if(charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), {
                type: 'line',
                data: { datasets: [
                    { label: 'Violeta', data: prep(fVio, field, type, 'violeta'), borderColor: CONFIG.violeta.color, borderWidth: 4, tension: 0.3, pointRadius: 0 },
                    { label: 'Verde', data: prep(fVer, field, type, 'verde'), borderColor: CONFIG.verde.color, borderWidth: 4, tension: 0.3, pointRadius: 0 },
                    { label: 'Blanca', data: prep(fBla, field, type, 'blanca'), borderColor: CONFIG.blanca.color, borderWidth: 4, tension: 0.3, pointRadius: 0 }
                ]},
                options: { 
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { 
                        x: { type: 'time', time: { unit: 'hour' }, ticks: { font: { weight: 'bold' } } },
                        y: { beginAtZero: type === 'rain', ticks: { font: { weight: 'bold' } } }
                    }
                }
            });
        };

        [['chartTemp','field1','normal'],['chartHum','field2','normal'],['chartRain','field5','rain'],['chartPres','field6','normal']].forEach(m => makeChart(...m));
    }

    const hoy = new Date().toISOString().split('T')[0];
    document.getElementById('fechaInicio').value = hoy;
    document.getElementById('fechaFin').value = hoy;
    cargarDatos();
</script>
</body>
</html>
