<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis Meteorológico UNLP - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top left, #1e293b, #0f172a); color: #f8fafc; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; overflow: hidden; }
        
        /* ESTILOS DEL TANQUE DE AGUA */
        .water-tank { position: relative; width: 100%; height: 100px; background: rgba(0,0,0,0.2); overflow: hidden; border-radius: 12px; }
        .water-level { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: linear-gradient(180deg, #3b82f6 0%, #1d4ed8 100%);
            transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }
        /* La Onda Animada */
        .wave {
            position: absolute; top: -15px; left: 0; width: 200%; height: 20px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,0V46.29c47.79,22.2,103.59,32.17,158,28,70.36-5.37,136.33-33.31,206.8-37.5C438.64,32.43,512.34,53.67,583,72.05c69.27,18,138.3,24.88,209.4,13.08,36.15-6,69.85-17.84,104.45-29.34C989.49,25,1113-14.29,1200,52.47V0Z" fill="%233b82f6"/></svg>');
            background-size: 50% 100%;
            animation: move-wave 3s linear infinite;
        }
        @keyframes move-wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .tank-label { position: absolute; z-index: 10; width: 100%; text-align: center; top: 50%; transform: translateY(-50%); font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Intercomparación de EMAs</h1>
                <p class="text-slate-400">Datos en tiempo real · La Plata</p>
            </div>
            <div class="glass p-4 flex flex-wrap gap-4 items-center">
                <input type="date" id="fechaInicio">
                <input type="date" id="fechaFin">
                <button onclick="cargarDatos()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-xl font-bold">Filtrar</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass p-4">
                <span class="text-[10px] font-bold text-purple-400 uppercase tracking-widest block mb-2">Lluvia Diaria (Vio)</span>
                <div class="water-tank">
                    <div class="tank-label text-2xl"><span id="txt-rain-violeta">0.0</span> mm</div>
                    <div class="water-level" id="level-violeta" style="height: 0%;">
                        <div class="wave"></div>
                    </div>
                </div>
            </div>
            <div class="glass p-4">
                <span class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-2">Lluvia Diaria (Ver)</span>
                <div class="water-tank">
                    <div class="tank-label text-2xl"><span id="txt-rain-verde">0.0</span> mm</div>
                    <div class="water-level" id="level-verde" style="height: 0%; background: linear-gradient(180deg, #10b981 0%, #064e3b 100%);">
                        <div class="wave" style="filter: hue-rotate(90deg);"></div>
                    </div>
                </div>
            </div>
            <div class="glass p-4">
                <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest block mb-2">Lluvia Diaria (Bla)</span>
                <div class="water-tank">
                    <div class="tank-label text-2xl"><span id="txt-rain-blanca">0.0</span> mm</div>
                    <div class="water-level" id="level-blanca" style="height: 0%;">
                        <div class="wave"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass p-6"><h3>Temperatura Ambiente</h3><div class="h-80"><canvas id="chartTemp"></canvas></div></div>
            <div class="glass p-6"><h3>Lluvia Acumulada</h3><div class="h-80"><canvas id="chartRain"></canvas></div></div>
        </div>
    </div>

<script>
    lucide.createIcons();
    const CONFIG = {
        violeta: { id: 2626952, key: "AXYH56YSV64HE17H", color: '#a855f7' },
        verde: { id: 2218686, key: "JUXJQRZMFFASO37Z", color: '#10b981' },
        blanca: { id: 2218689, key: "ZLNOSLZJPQM3H7SD", color: '#3b82f6' }
    };
    let charts = {};

    async function cargarDatos() {
        const query = `results=800&timezone=America/Argentina/Buenos_Aires`;
        const resultados = await Promise.all(Object.keys(CONFIG).map(k => fetch(`https://api.thingspeak.com/channels/${CONFIG[k].id}/feeds.json?${query}&api_key=${CONFIG[k].key}`).then(r => r.json())));
        dibujarGraficos(resultados[0].feeds, resultados[1].feeds, resultados[2].feeds);
    }

    function dibujarGraficos(fVio, fVer, fBla) {
        const prepararDatos = (feeds, field, type, emaKey) => {
            let fieldBusqueda = (type === 'rain') ? (emaKey === 'verde' ? 'field3' : 'field5') : field;
            let acumulado = 0, ultimoDia = -1, valAnt = null;

            return feeds.filter(f => f[fieldBusqueda] !== null).map(f => {
                const fecha = new Date(f.created_at);
                let val = parseFloat(f[fieldBusqueda]) || 0;
                if (type === 'rain') {
                    let dia = fecha.getDate(); if (fecha.getHours() < 9) dia -= 1;
                    if (ultimoDia !== dia) { acumulado = 0; ultimoDia = dia; valAnt = val; }
                    if (emaKey !== 'verde') { 
                        let inc = val - (valAnt !== null ? valAnt : val); 
                        if (inc < 0) inc = 0; acumulado += inc; valAnt = val; 
                    } else { acumulado += val; }
                    
                    // ACTUALIZAR EL TANQUE
                    document.getElementById(`txt-rain-${emaKey}`).innerText = acumulado.toFixed(1);
                    // Calculamos el % del tanque (ponemos 50mm como el 100% del tanque, podés ajustarlo)
                    let porcentaje = Math.min((acumulado / 50) * 100, 100);
                    document.getElementById(`level-${emaKey}`).style.height = porcentaje + "%";

                    return { x: fecha.getTime(), y: parseFloat(acumulado.toFixed(2)) };
                }
                return { x: fecha.getTime(), y: val };
            });
        };

        const config = (id, field, type) => ({
            type: 'line',
            data: { datasets: [
                { label: 'Violeta', data: prepararDatos(fVio, field, type, 'violeta'), borderColor: CONFIG.violeta.color },
                { label: 'Verde', data: prepararDatos(fVer, field, type, 'verde'), borderColor: CONFIG.verde.color },
                { label: 'Blanca', data: prepararDatos(fBla, field, type, 'blanca'), borderColor: CONFIG.blanca.color }
            ]},
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { type: 'time' } } }
        });

        [['chartTemp', 'field1', 'normal'], ['chartRain', 'field5', 'rain']].forEach(([id, field, type]) => {
            if(charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), config(id, field, type));
        });
    }

    cargarDatos();
</script>
</body>
</html>
