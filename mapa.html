<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red 3D - Efecto Viñeta UNLP</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { 
            background-color: #0f172a; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Inter', sans-serif;
        }
        
        /* Contenedor principal */
        #map-container {
            perspective: 1200px;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            position: relative;
        }

        /* OPCIÓN 2: Capa de Viñeta (Degradado que oscurece los bordes) */
        #vignette-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* El centro es transparente y los bordes se vuelven del color del fondo */
            background: radial-gradient(circle, rgba(15,23,42,0) 30%, rgba(15,23,42,0.8) 70%, rgba(15,23,42,1) 95%);
            z-index: 10; /* Por encima del mapa */
            pointer-events: none; /* Deja pasar los clics al mapa */
        }

        /* Mapa inclinado */
        #map {
            width: 130%;
            height: 130%;
            transform: rotateX(28deg) rotateZ(-5deg);
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            transition: all 0.7s ease-in-out;
            z-index: 1;
        }

        /* Panel de Control */
        .ui-panel {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 1000;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 320px;
        }

        .station-btn {
            background: rgba(255,255,255,0.05);
            transition: all 0.3s;
        }
        .station-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: translateX(5px);
        }

        /* Estilo de Popups */
        .leaflet-popup-content-wrapper {
            background: #1e293b !important;
            color: white !important;
            border-radius: 15px !important;
        }
        .leaflet-popup-tip { background: #1e293b !important; }
    </style>
</head>
<body>

    <div class="ui-panel shadow-2xl">
        <h2 class="text-xl font-black mb-1 tracking-tight">Red Meteorológica</h2>
        <p class="text-blue-400 text-[10px] uppercase font-bold tracking-widest mb-6">Visualizador de Relieve</p>
        
        <div class="space-y-3">
            <button onclick="volarA(-34.918, -57.815)" class="station-btn w-full p-4 rounded-2xl text-left border border-white/5">
                <span class="block font-bold text-sm">EEP N°20</span>
                <span class="text-[10px] text-slate-400">Berisso · Costa</span>
            </button>
            
            <button onclick="volarA(-35.150, -57.650)" class="station-btn w-full p-4 rounded-2xl text-left border border-white/5">
                <span class="block font-bold text-sm">Escuela N°26</span>
                <span class="text-[10px] text-slate-400">Vergara · Rural</span>
            </button>

            <button onclick="volarA(-34.910, -57.935)" class="station-btn w-full p-4 rounded-2xl text-left border border-white/5">
                <span class="block font-bold text-sm">Facultad</span>
                <span class="text-[10px] text-slate-400">FCAGLP · Bosque</span>
            </button>
        </div>
    </div>

    <div id="map-container">
        <div id="vignette-overlay"></div>
        
        <div id="map"></div>
    </div>

    <script>
        // Inicializar Mapa
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([-34.98, -57.85], 11);

        // Capa de Relieve (OpenTopoMap)
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            maxZoom: 17
        }).addTo(map);

        // Estaciones
        const puntos = [
            { nombre: "EEP N°20", latlng: [-34.918, -57.815], color: "#3b82f6" },
            { nombre: "Escuela N°26", latlng: [-35.150, -57.650], color: "#10b981" },
            { nombre: "FCAGLP", latlng: [-34.910, -57.935], color: "#a855f7" }
        ];

        puntos.forEach(p => {
            L.circleMarker(p.latlng, {
                radius: 10,
                fillColor: p.color,
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(map).bindPopup(`<b class="text-lg">${p.nombre}</b><br><span class="text-slate-400 text-xs italic">Ubicación Confirmada</span>`);
        });

        // Función de vuelo
        function volarA(lat, lng) {
            map.flyTo([lat, lng], 14, {
                duration: 2
            });
        }
    </script>
</body>
</html>
