<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Meteorológica UNLP - Datos en Vivo</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #f8fafc; color: #1e293b; margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        #main-wrapper { width: 100vw; height: 100vh; display: flex; }
        
        .ui-panel {
            width: 360px;
            height: 100vh;
            background: white;
            border-right: 1px solid #e2e8f0;
            padding: 25px;
            z-index: 1000;
            overflow-y: auto;
        }

        #map { flex-grow: 1; height: 100vh; z-index: 1; }

        .station-btn {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 16px;
            width: 100%;
            margin-bottom: 8px;
            text-align: left;
        }
        .station-btn:hover { border-color: #3b82f6; background: #eff6ff; }

        /* Estilos del Widget de Datos */
        .data-badge {
            background: rgba(255,255,255,0.1);
            padding: 4px 8px;
            border-radius: 8px;
            display: inline-block;
            margin: 2px;
        }
    </style>
</head>
<body>

    <div id="main-wrapper">
        <aside class="ui-panel shadow-lg">
            <div class="mb-6">
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">Red de Escuelas</h1>
                <p class="text-xs text-blue-600 font-bold uppercase tracking-widest mt-1">Monitoreo Atmosférico</p>
            </div>
            
            <div id="button-container"></div>

            <div class="mt-8 p-4 bg-blue-50 rounded-2xl border border-blue-100">
                <p class="text-[10px] text-blue-700 font-medium">
                    🟢 Datos en tiempo real disponibles para estaciones Verde (23) y Blanca (34).
                </p>
            </div>
        </aside>

        <div id="map"></div>
    </div>

    <script>
        const puntos = [
            { id: "2218686", n: "EP N°23", loc: "Bavio", c: [-35.0254, -57.7529], clr: "#10b981", live: true, img: "imagenes/escuela23.jpg" },
            { id: "2218689", n: "EP N°34", loc: "Malagamba", c: [-35.0724, -57.8656], clr: "#3b82f6", live: true, img: "imagenes/escuela34.jpg" },
            { id: "e20", n: "EP N°20", loc: "Berisso", c: [-34.9515, -57.8353], clr: "#64748b", live: false, img: "imagenes/ep20.png" },
            { id: "e26", n: "EP N°26", loc: "Vergara", c: [-35.3825, -57.8042], clr: "#64748b", live: false, img: "https://cdn-icons-png.flaticon.com/512/2859/2859736.png" },
            { id: "e24", n: "EP N°24", loc: "Roberto Payró", c: [-35.1835, -57.6543], clr: "#64748b", live: false, img: "https://cdn-icons-png.flaticon.com/512/2859/2859736.png" },
            { id: "fac", n: "Facultad", loc: "FCAGLP", c: [-34.9105, -57.9351], clr: "#8b5cf6", live: false, img: "imagenes/observatorio.png" }
        ];

        const map = L.map('map', { zoomControl: true }).setView([-35.10, -57.85], 10);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 }).addTo(map);

        const btnContainer = document.getElementById('button-container');

        // Función para obtener datos de ThingSpeak
        async function getLiveData(channelId) {
            try {
                const response = await fetch(`https://api.thingspeak.com/channels/${channelId}/feeds/last.json`);
                const data = await response.json();
                return {
                    temp: parseFloat(data.field1).toFixed(1),
                    hum: parseFloat(data.field2).toFixed(0)
                };
            } catch (e) { return null; }
        }

        puntos.forEach(async p => {
            const marker = L.circleMarker(p.c, {
                radius: 10, fillColor: p.clr, color: "#fff", weight: 2, fillOpacity: 0.9
            }).addTo(map);

            // Crear el contenido del Popup
            let dataHTML = `<p class="text-slate-400 text-[10px] mt-2 italic">Sensor fuera de línea</p>`;
            
            if (p.live) {
                const live = await getLiveData(p.id);
                if (live) {
                    dataHTML = `
                        <div class="flex justify-around mt-3 bg-slate-700 p-2 rounded-xl text-white">
                            <div><span class="block text-[9px] uppercase opacity-60">Temp</span><b class="text-sm">${live.temp}°C</b></div>
                            <div class="border-l border-white/20"></div>
                            <div><span class="block text-[9px] uppercase opacity-60">Hum</span><b class="text-sm">${live.hum}%</b></div>
                        </div>
                    `;
                }
            }

            const popupHTML = `
                <div style="width: 200px; text-align: center;">
                    <img src="${p.img}" style="width: 100%; height: 90px; object-fit: cover; border-radius: 12px; margin-bottom: 8px;">
                    <b class="text-sm block">${p.n}</b>
                    <span class="text-[10px] text-slate-500 uppercase">${p.loc}</span>
                    ${dataHTML}
                    <button onclick="window.location.href='analisis.html?id=${p.id}'" 
                            class="mt-3 w-full bg-blue-600 text-white py-2 rounded-lg text-[10px] font-bold">
                        HISTORIAL COMPLETO
                    </button>
                </div>
            `;
            marker.bindPopup(popupHTML);

            // Botón lateral
            const btn = document.createElement('button');
            btn.className = "station-btn shadow-sm";
            btn.innerHTML = `
                <img src="${p.img}" class="w-10 h-10 rounded-lg object-cover">
                <div>
                    <span class="block font-bold text-xs text-slate-700">${p.n}</span>
                    <span class="text-[9px] text-slate-500 uppercase">${p.loc}</span>
                </div>
            `;
            btn.onclick = () => { map.flyTo(p.c, 14); marker.openPopup(); };
            btnContainer.appendChild(btn);
        });
    </script>
</body>
</html>
