<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa de Relieve - Tiempo en tu Escuela</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 600px; width: 100%; border-radius: 24px; z-index: 1; }
        /* Estilo para que el popup combine con tu dashboard oscuro */
        .leaflet-popup-content-wrapper { background: #1e293b; color: white; border-radius: 12px; }
        .leaflet-popup-tip { background: #1e293b; }
    </style>
</head>
<body class="bg-slate-100 p-4 md:p-8 text-slate-800">

    <div class="max-w-6xl mx-auto">
        <header class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black tracking-tight">Red de Estaciones</h1>
                <p class="text-slate-500">Topografía y Relieve de la Región</p>
            </div>
            <button onclick="centrarMapa()" class="bg-white border border-slate-200 px-4 py-2 rounded-xl shadow-sm hover:bg-slate-50 font-bold text-sm">
                Recentrar Mapa
            </button>
        </header>

        <div id="map" class="shadow-xl border-4 border-white"></div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
            <div class="bg-blue-600 p-6 rounded-3xl text-white">
                <h3 class="font-bold text-xl mb-2">Escuela 20 (Berisso)</h3>
                <p class="text-blue-100 text-sm">Zona de bañados y costa. Elevación baja, alta influencia de humedad ribereña.</p>
            </div>
            <div class="bg-emerald-600 p-6 rounded-3xl text-white">
                <h3 class="font-bold text-xl mb-2">Escuela 26 (Vergara)</h3>
                <p class="text-emerald-100 text-sm">Zona de llanura alta. Ideal para medir vientos superficiales y heladas.</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Coordenadas para centrar el mapa entre LP, Berisso y Vergara
        const map = L.map('map').setView([-35.00, -57.85], 10);

        // CAPA DE RELIEVE GRATUITA (OpenTopoMap)
        const topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            maxZoom: 17,
            attribution: 'Map data: &copy; OpenStreetMap contributors, SRTM | Map style: &copy; OpenTopoMap (CC-BY-SA)'
        }).addTo(map);

        // Marcadores
        const escuelas = [
            { nombre: "EEP N°20", loc: [-34.918, -57.815], desc: "Ruta 11 - Berisso" },
            { nombre: "Escuela N°26", loc: [-35.150, -57.650], desc: "Vergara - Magdalena" },
            { nombre: "Facultad (FCAGLP)", loc: [-34.910, -57.935], desc: "Paseo del Bosque" }
        ];

        escuelas.forEach(esc => {
            L.marker(esc.loc).addTo(map)
                .bindPopup(`
                    <div class="text-center">
                        <b class="text-lg">${esc.nombre}</b><br>
                        <span class="text-slate-400 text-xs">${esc.desc}</span><br>
                        <button class="mt-2 bg-blue-500 text-white px-3 py-1 rounded-lg text-xs font-bold">Ver Datos</button>
                    </div>
                `);
        });

        function centrarMapa() {
            map.setView([-35.00, -57.85], 10);
        }
    </script>
</body>
</html>
