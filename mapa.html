<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Escolar UNLP - Estaciones</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #f8fafc; color: #1e293b; margin: 0; font-family: 'Inter', sans-serif; }
        #main-wrapper { width: 100vw; height: 100vh; display: flex; }
        
        .ui-panel {
            width: 350px;
            height: 100vh;
            background: white;
            border-right: 1px solid #e2e8f0;
            padding: 25px;
            z-index: 1000;
            overflow-y: auto;
        }

        #map { flex-grow: 1; height: 100vh; z-index: 1; }

        .station-btn {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 16px;
            width: 100%;
            margin-bottom: 10px;
            text-align: left;
        }
        .station-btn:hover {
            border-color: #3b82f6;
            background: #eff6ff;
            transform: translateX(5px);
        }

        .leaflet-popup-content-wrapper { border-radius: 16px; padding: 5px; }
    </style>
</head>
<body>

    <div id="main-wrapper">
        <aside class="ui-panel shadow-lg">
            <div class="mb-8">
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">Red de Estaciones</h1>
                <p class="text-xs text-blue-600 font-bold uppercase tracking-widest mt-1">Control de Nodos Rurales</p>
            </div>
            
            <div id="button-container">
                </div>

            <div class="mt-10 p-4 bg-slate-50 rounded-2xl border border-slate-100 text-[11px] text-slate-500 italic leading-relaxed">
                Visualización de estaciones meteorológicas operativas. Los colores corresponden a los nodos de intercomparación.
            </div>
        </aside>

        <div id="map"></div>
    </div>

    <script>
        // Configuración específica de tus estaciones
        const estaciones = [
            { 
                id: "2218686", 
                n: "EP N°23 (Verde)", 
                loc: "Bavio / San Martín", 
                c: [-35.0254, -57.7529], 
                clr: "#10b981", // Verde Esmeralda
                img: "imagenes/escuela23.jpg" 
            },
            { 
                id: "2218689", 
                n: "EP N°34 (Blanca)", 
                loc: "Paraje Malagamba", 
                c: [-35.0724, -57.8656], 
                clr: "#3b82f6", // Azul (Blanca en el dashboard)
                img: "imagenes/escuela34.jpg" 
            },
            { 
                id: "2626952", 
                n: "EMA Violeta", 
                loc: "Facultad (FCAGLP)", 
                c: [-34.9105, -57.9351], 
                clr: "#a855f7", 
                img: "imagenes/ep20.png" 
            }
        ];

        const map = L.map('map', { zoomControl: true }).setView([-35.05, -57.85], 11);

        // Capa de Relieve (OpenTopoMap)
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            maxZoom: 17,
            attribution: '© OpenTopoMap'
        }).addTo(map);

        const btnContainer = document.getElementById('button-container');

        estaciones.forEach(p => {
            // Marcador en el mapa
            const marker = L.circleMarker(p.c, {
                radius: 10,
                fillColor: p.clr,
                color: "#fff",
                weight: 2,
                fillOpacity: 0.9
            }).addTo(map);

            // Globo de información (Popup)
            const popupHTML = `
                <div style="width: 180px; text-align: center;">
                    <img src="${p.img}" style="width: 100%; height: 90px; object-fit: cover; border-radius: 10px; margin-bottom: 8px;">
                    <b style="font-size: 14px; display: block;">${p.n}</b>
                    <span style="font-size: 11px; color: #64748b;">${p.loc}</span>
                    <hr style="margin: 10px 0; border: 0; border-top: 1px solid #eee;">
                    <button onclick="window.location.href='analisis.html?id=${p.id}'" 
                            style="background: ${p.clr}; color: white; border: none; padding: 8px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; width: 100%;">
                        VER DATOS EN VIVO
                    </button>
                </div>
            `;
            marker.bindPopup(popupHTML);

            // Botón en el panel lateral
            const btn = document.createElement('button');
            btn.className = "station-btn shadow-sm";
            btn.innerHTML = `
                <div style="width: 12px; height: 35px; background: ${p.clr}; border-radius: 4px;"></div>
                <div>
                    <span class="block font-bold text-sm text-slate-700">${p.n}</span>
                    <span class="text-[10px] text-slate-500 uppercase font-medium">${p.loc}</span>
                </div>
            `;
            btn.onclick = () => {
                map.flyTo(p.c, 14);
                marker.openPopup();
            };
            btnContainer.appendChild(btn);
        });
    </script>
</body>
</html>
