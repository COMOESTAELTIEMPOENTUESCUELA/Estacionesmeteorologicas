<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red 3D - Ventana Difuminada UNLP</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #f1f5f9; color: #1e293b; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        /* Contenedor principal para centrar */
        #main-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* EL "CUADRADO" CON BORDES DIFUMINADOS (MÁSCARA) */
        #map-mask-container {
            width: 90vw; /* Tamaño del contenedor visible */
            height: 85vh;
            background-color: white; /* Color de fondo del "cuadrado" */
            border-radius: 40px; /* Bordes redondeados del cuadrado */
            box-shadow: 0 40px 100px rgba(0,0,0,0.1); /* Sombra suave para darle relieve al cuadrado */
            
            overflow: hidden; /* Importante para que el mapa no se salga */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;

            /* APLICAMOS LA MÁSCARA CSS AQUÍ */
            -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 90%);
            mask-image: radial-gradient(circle, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 90%);
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
        }

        /* El mapa inclinado dentro de la máscara */
        #map {
            width: 150%; /* Aumentamos el tamaño para que cubra todo el área de la máscara al inclinarse */
            height: 150%;
            transform: rotateX(25deg) rotateZ(-5deg); /* Mantenemos la inclinación 3D */
            z-index: 1;
            /* No aplicamos border-radius ni sombras aquí, la máscara se encarga */
        }

        /* Estilo de los Popups (Oscuro y moderno) */
        .leaflet-popup-content-wrapper {
            background: #1e293b !important;
            color: white !important;
            border-radius: 15px !important;
        }
        .leaflet-popup-tip { background: #1e293b !important; }

        /* Panel de Control Flotante */
        .ui-panel {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 25px;
            border: 1px solid rgba(0,0,0,0.05);
            width: 280px;
        }

        .station-btn {
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        .station-btn:hover {
            background: rgba(37, 99, 235, 0.1);
            transform: translateX(5px);
            border-color: rgba(37, 99, 235, 0.2);
            color: #2563eb;
        }
    </style>
</head>
<body>

    <div id="main-wrapper">
        <div class="ui-panel shadow-lg">
            <h2 class="text-lg font-bold mb-1 tracking-tight">Red Meteorológica</h2>
            <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest mb-5">Visualizador UNLP</p>
            
            <div class="space-y-2">
                <button onclick="volarA(-34.918, -57.815)" class="station-btn w-full p-3 rounded-xl text-left">
                    <span class="block font-semibold text-xs">EEP N°20</span>
                    <span class="text-[9px] text-slate-400">Berisso · Costa</span>
                </button>
                
                <button onclick="volarA(-35.150, -57.650)" class="station-btn w-full p-3 rounded-xl text-left">
                    <span class="block font-semibold text-xs">Escuela N°26</span>
                    <span class="text-[9px] text-slate-400">Vergara · Rural</span>
                </button>

                <button onclick="volarA(-34.910, -57.935)" class="station-btn w-full p-3 rounded-xl text-left">
                    <span class="block font-semibold text-xs">Facultad</span>
                    <span class="text-[9px] text-slate-400">FCAGLP · Bosque</span>
                </button>
            </div>
        </div>

        <div id="map-mask-container">
            <div id="map"></div>
        </div>
    </div>

    <script>
        // Inicializar Mapa centrado
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([-34.98, -57.85], 11);

        // Capa de Relieve (OpenTopoMap)
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            maxZoom: 17
        }).addTo(map);

        // Estaciones
        const puntos = [
            { nombre: "EEP N°20", latlng: [-34.918, -57.815], color: "#3b82f6" },
            { nombre: "Escuela N°26", latlng: [-35.150, -57.650], color: "#10b981" },
            { nombre: "FCAGLP", latlng: [-34.910, -57.935], color: "#a855f7" }
        ];

        puntos.forEach(p => {
            L.circleMarker(p.latlng, {
                radius: 10,
                fillColor: p.color,
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(map).bindPopup(`<b class="text-base">${p.nombre}</b><br><span class="text-slate-400 text-xs italic">Ubicación Confirmada</span>`);
        });

        // Función de vuelo suave
        function volarA(lat, lng) {
            map.flyTo([lat, lng], 14, {
                duration: 2
            });
        }
    </script>
</body>
</html>
