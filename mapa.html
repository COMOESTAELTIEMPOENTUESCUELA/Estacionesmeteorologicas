<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red 3D - Marco Difuminado Fino UNLP</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #f8fafc; color: #1e293b; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        #main-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* EL CONTENEDOR CON EL DIFUMINADO FINO EN TODO EL CONTORNO */
        #map-mask-container {
            width: 92vw;
            height: 88vh;
            background-color: white;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            overflow: hidden;
            position: relative;

            /* MÁSCARA LINEAL PARA DIFUMINADO PERIFÉRICO FINO */
            /* Esto crea un desvanecimiento suave de 40px en los 4 bordes */
            -webkit-mask-image: 
                linear-gradient(to bottom, transparent, black 40px, black calc(100% - 40px), transparent),
                linear-gradient(to right, transparent, black 40px, black calc(100% - 40px), transparent);
            mask-image: 
                linear-gradient(to bottom, transparent, black 40px, black calc(100% - 40px), transparent),
                linear-gradient(to right, transparent, black 40px, black calc(100% - 40px), transparent);
            -webkit-mask-composite: source-in;
            mask-composite: intersect;
        }

        /* El mapa inclinado */
        #map {
            width: 140%; /* Un poco más grande para evitar que se vean los bordes reales al rotar */
            height: 140%;
            position: absolute;
            top: -20%;
            left: -20%;
            transform: rotateX(22deg) rotateZ(-4deg);
            z-index: 1;
        }

        /* Panel UI Refinado */
        .ui-panel {
            position: absolute;
            top: 40px;
            left: 60px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 28px;
            border: 1px solid rgba(0,0,0,0.08);
            width: 280px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .station-btn {
            background: #f1f5f9;
            border: 1px solid transparent;
            transition: all 0.2s;
            margin-bottom: 8px;
        }
        .station-btn:hover {
            background: #e2e8f0;
            border-color: #cbd5e1;
            transform: translateY(-2px);
        }

        /* Popups */
        .leaflet-popup-content-wrapper {
            background: #1e293b !important;
            color: white !important;
            border-radius: 12px !important;
        }
    </style>
</head>
<body>

    <div id="main-wrapper">
        <div class="ui-panel">
            <h2 class="text-lg font-black text-slate-800">Red de Estaciones</h2>
            <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest mb-4">Proyecto Extensión UNLP</p>
            
            <button onclick="volarA(-34.918, -57.815)" class="station-btn w-full p-3 rounded-xl text-left">
                <span class="block font-bold text-xs text-slate-700">EEP N°20 (Berisso)</span>
                <span class="text-[9px] text-slate-500 italic">Ruta 11 Km 13</span>
            </button>
            
            <button onclick="volarA(-35.150, -57.650)" class="station-btn w-full p-3 rounded-xl text-left">
                <span class="block font-bold text-xs text-slate-700">EP N°26 (Vergara)</span>
                <span class="text-[9px] text-slate-500 italic">Zona Rural</span>
            </button>

            <button onclick="volarA(-34.910, -57.935)" class="station-btn w-full p-3 rounded-xl text-left">
                <span class="block font-bold text-xs text-slate-700">Facultad (FCAGLP)</span>
                <span class="text-[9px] text-slate-500 italic">Paseo del Bosque</span>
            </button>
        </div>

        <div id="map-mask-container">
            <div id="map"></div>
        </div>
    </div>

    <script>
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([-34.98, -57.85], 11);

        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            maxZoom: 17
        }).addTo(map);

        const escuelas = [
            { n: "EEP N°20", c: [-34.918, -57.815], clr: "#3b82f6" },
            { n: "Escuela N°26", c: [-35.150, -57.650], clr: "#10b981" },
            { n: "FCAGLP", c: [-34.910, -57.935], clr: "#a855f7" }
        ];

        escuelas.forEach(e => {
            L.circleMarker(e.c, {
                radius: 9,
                fillColor: e.clr,
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(map).bindPopup(`<b class="text-sm">${e.n}</b>`);
        });

        function volarA(lat, lng) {
            map.flyTo([lat, lng], 14, { duration: 2 });
        }
    </script>
</body>
</html>
