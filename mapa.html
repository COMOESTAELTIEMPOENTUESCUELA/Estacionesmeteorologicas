<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Red 3D Gratis - Tiempo en tu Escuela</title>
    <script src="https://unpkg.com/maplibre-gl@3.0.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.0.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .control-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="absolute top-6 left-6 z-10 control-panel p-6 rounded-3xl shadow-xl max-w-xs">
    <h2 class="text-xl font-black text-slate-800">Visualizador 3D</h2>
    <p class="text-xs text-slate-500 mt-1">Usa el botón derecho del mouse para rotar e inclinar la cámara.</p>
    
    <div class="mt-4 space-y-2">
        <button onclick="irA('berisso')" class="w-full bg-blue-600 text-white p-3 rounded-2xl font-bold text-sm hover:bg-blue-700 transition">
            Volar a Berisso (Esc. 20)
        </button>
        <button onclick="irA('vergara')" class="w-full bg-emerald-600 text-white p-3 rounded-2xl font-bold text-sm hover:bg-emerald-700 transition">
            Volar a Vergara (Esc. 26)
        </button>
    </div>
</div>

<script>
    // Usamos un estilo de mapa gratuito de MapTiler (sin necesidad de key para pruebas locales)
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://demotiles.maplibre.org/style.json', // Estilo básico libre
        center: [-57.85, -34.95],
        zoom: 10,
        pitch: 60, // ESTA ES LA INCLINACIÓN 3D
        bearing: -20 // Rotación de la cámara
    });

    // Añadir controles de navegación (zoom y rotación)
    map.addControl(new maplibregl.NavigationControl());

    // Puntos de interés
    const puntos = {
        'berisso': [-57.815, -34.918],
        'vergara': [-57.650, -35.150]
    };

    // Agregar Marcadores 3D
    new maplibregl.Marker({ color: '#2563eb' })
        .setLngLat(puntos.berisso)
        .setPopup(new maplibregl.Popup().setHTML("<b>Escuela 20</b><br>Berisso"))
        .addTo(map);

    new maplibregl.Marker({ color: '#059669' })
        .setLngLat(puntos.vergara)
        .setPopup(new maplibregl.Popup().setHTML("<b>Escuela 26</b><br>Vergara"))
        .addTo(map);

    function irA(lugar) {
        map.flyTo({
            center: puntos[lugar],
            zoom: 13,
            pitch: 70, // Más inclinado al acercarse
            speed: 0.8,
            essential: true
        });
    }
</script>

</body>
</html>
