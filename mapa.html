<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red 3D - Relieve Flotante UNLP</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { 
            background-color: #020617; /* Un negro azulado más profundo */
            color: white; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        /* Contenedor con perspectiva */
        #map-container {
            perspective: 1500px;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
        }

        /* OPCIÓN 1: Mapa con Sombra Profunda y Bordes Suaves */
        #map {
            width: 140%; /* Más grande para ocultar bordes */
            height: 140%;
            transform: rotateX(30deg) rotateZ(-4deg);
            border-radius: 80px; /* Bordes muy redondeados para suavizar la silueta */
            
            /* Sombra masiva y difuminada que funde el borde con el fondo */
            box-shadow: 0 80px 150px rgba(0, 0, 0, 0.9);
            
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 1;
            border: none; /* Quitamos cualquier borde sólido */
        }

        /* Estilo de los Popups (Oscuro y moderno) */
        .leaflet-popup-content-wrapper {
            background: #1e293b !important;
            color: white !important;
            border-radius: 20px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .leaflet-popup-tip { background: #1e293b !important; }

        /* Panel de Control */
        .ui-panel {
            position: absolute;
            top: 50px;
            left: 50px;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.05);
            width: 320px;
        }

        .btn-school {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .btn-school:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="ui-panel shadow-2xl">
        <header class="mb-8">
            <h1 class="text-2xl font-black tracking-tight text-white">Red de Escuelas</h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Proyecto de Extensión</p>
        </header>
        
        <div class="space-y-4">
            <button onclick="volarA(-34.918, -57.815)" class="btn-school w-full p-4 rounded-3xl text-left flex items-center gap-4 group">
                <div class="w-2 h-10 bg-blue-500 rounded-full group-hover:h-12 transition-all"></div>
                <div>
                    <span class="block font-bold text-sm">Escuela 20</span>
                    <span class="text-[10px] text-slate-500 uppercase">Berisso · Ruta 11</span>
                </div>
            </button>
            
            <button onclick="volarA(-35.150, -57.650)" class="btn-school w-full p-4 rounded-3xl text-left flex items-center gap-4 group">
                <div class="w-2 h-10 bg-emerald-500 rounded-full group-hover:h-12 transition-all"></div>
                <div>
                    <span class="block font-bold text-sm">Escuela 26</span>
                    <span class="text-[10px] text-slate-500 uppercase">Vergara · Rural</span>
                </div>
            </button>

            <button onclick="volarA(-34.910, -57.935)" class="btn-school w-full p-4 rounded-3xl text-left flex items-center gap-4 group">
                <div class="w-2 h-10 bg-purple-500 rounded-full group-hover:h-12 transition-all"></div>
                <div>
                    <span class="block font-bold text-sm">Facultad</span>
                    <span class="text-[10px] text-slate-500 uppercase">FCAGLP · Bosque</span>
                </div>
            </button>
        </div>

        <footer class="mt-10 opacity-30 text-[10px] font-bold tracking-tighter text-center">
            UNLP · CIENCIAS ASTRONÓMICAS Y GEOFÍSICAS
        </footer>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <script>
        // Inicializar Mapa centrado
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([-34.95, -57.85], 11);

        // Capa de Relieve Topográfico (OpenTopoMap)
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            maxZoom: 17
        }).addTo(map);

        // Marcadores de Estaciones
        const estaciones = [
            { nombre: "EEP N°20", coords: [-34.918, -57.815], color: "#3b82f6" },
            { nombre: "Escuela N°26", coords: [-35.150, -57.650], color: "#10b981" },
            { nombre: "Facultad", coords: [-34.910, -57.935], color: "#a855f7" }
        ];

        estaciones.forEach(est => {
            const marker = L.circleMarker(est.coords, {
                radius: 12,
                fillColor: est.color,
                color: "#fff",
                weight: 3,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(map);

            marker.bindPopup(`
                <div class="text-center">
                    <b class="text-lg">${est.nombre}</b><br>
                    <span class="text-blue-400 text-xs font-bold uppercase">Datos en vivo</span>
                </div>
            `);
        });

        // Función de vuelo suave
        function volarA(lat, lng) {
            map.flyTo([lat, lng], 14, {
                duration: 2,
                easeLinearity: 0.2
            });
        }
    </script>
</body>
</html>
