<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red 3D - Red Escolar UNLP</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #f8fafc; color: #1e293b; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        #main-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* CONTENEDOR CON DIFUMINADO FINO */
        #map-mask-container {
            width: 94vw;
            height: 90vh;
            background-color: white;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            overflow: hidden;
            position: relative;

            -webkit-mask-image: 
                linear-gradient(to bottom, transparent, black 30px, black calc(100% - 30px), transparent),
                linear-gradient(to right, transparent, black 30px, black calc(100% - 30px), transparent);
            mask-image: 
                linear-gradient(to bottom, transparent, black 30px, black calc(100% - 30px), transparent),
                linear-gradient(to right, transparent, black 30px, black calc(100% - 30px), transparent);
            -webkit-mask-composite: source-in;
            mask-composite: intersect;
        }

        #map {
            width: 140%;
            height: 140%;
            position: absolute;
            top: -20%;
            left: -20%;
            transform: rotateX(20deg) rotateZ(-3deg);
            z-index: 1;
        }

        .ui-panel {
            position: absolute;
            top: 30px;
            left: 50px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(0,0,0,0.08);
            width: 260px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .station-btn {
            background: #f1f5f9;
            transition: all 0.2s;
            margin-bottom: 6px;
        }
        .station-btn:hover {
            background: #e2e8f0;
            transform: translateX(4px);
        }
    </style>
</head>
<body>

    <div id="main-wrapper">
        <div class="ui-panel shadow-xl">
            <h2 class="text-md font-black text-slate-800">Red Meteorológica</h2>
            <p class="text-[9px] text-blue-600 font-bold uppercase tracking-widest mb-4">Proyecto de Extensión</p>
            
            <div id="button-container"></div>
        </div>

        <div id="map-mask-container">
            <div id="map"></div>
        </div>
    </div>

    <script>
        const puntos = [
            { id: "e20", n: "EP N°20", loc: "Berisso (Ruta 11)", c: [-34.9515, -57.8353], clr: "#3b82f6" },
            { id: "e26", n: "EP N°26", loc: "Vergara", c: [-35.3825, -57.8042], clr: "#10b981" },
            { id: "e24", n: "EP N°24", loc: "Roberto Payró", c: [-35.1835, -57.6543], clr: "#f59e0b" },
            { id: "e23", n: "EP N°23", loc: "Bavio", c: [-35.0254, -57.7529], clr: "#ef4444" },
            { id: "e34", n: "EP N°34", loc: "Malagamba", c: [-35.0724, -57.8656], clr: "#ec4899" },
            { id: "fac", n: "Facultad", loc: "FCAGLP", c: [-34.9105, -57.9351], clr: "#8b5cf6" }
        ];

        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([-35.15, -57.80], 9); // Ajuste de centro inicial

        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 }).addTo(map);

        const btnContainer = document.getElementById('button-container');

        puntos.forEach(p => {
            L.circleMarker(p.c, {
                radius: 8,
                fillColor: p.clr,
                color: "#fff",
                weight: 2,
                fillOpacity: 0.9
            }).addTo(map).bindPopup(`<b class="text-sm">${p.n}</b><br><span class="text-xs text-slate-500">${p.loc}</span>`);

            const btn = document.createElement('button');
            btn.className = "station-btn w-full p-3 rounded-xl text-left border border-black/5";
            btn.innerHTML = `
                <span class="block font-bold text-xs text-slate-700">${p.n}</span>
                <span class="text-[9px] text-slate-500 italic">${p.loc}</span>
            `;
            btn.onclick = () => map.flyTo(p.c, 14, { duration: 1.5 });
            btnContainer.appendChild(btn);
        });
    </script>
</body>
</html>
